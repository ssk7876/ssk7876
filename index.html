<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>채종단지 생산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body,#root{height:100%;margin:0;padding:0;background:#f3f4f6;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#9ca3af;border-radius:2px;}
@media print{.no-print{display:none!important;}body{background:white;}}
/* ── 파종/수확 모달 스타일 ── */
:root{--rice:#2d6a4f;--rice-lt:#b7e4c7;--rice-bg:#f0faf4;--grain:#7b5e2a;--grain-lt:#f0d9a8;--grain-bg:#fdf8ee;--bean:#5c4a8a;--bean-lt:#d8cff0;--bean-bg:#f5f2fc;--navy:#1a2540;--gold:#c8960c;--cream:#faf8f3;--border:#ddd;--text:#1a1a1a;--muted:#666;--shadow:0 2px 16px rgba(0,0,0,0.08);--radius:12px;}
.sh-modal-overlay{position:fixed;inset:0;background:#f9fafb;z-index:9000;display:flex;flex-direction:column;overflow:hidden;}
.sh-modal-inner{background:#f9fafb;flex:1;overflow-y:auto;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto;scrollbar-width:none;-ms-overflow-style:none;}
.sh-modal-inner::-webkit-scrollbar{display:none;}
.sh-modal-header{background:#16a34a;padding:16px;display:flex;align-items:center;flex-shrink:0;}
.sh-modal-header h2{color:white;font-size:18px;font-weight:900;margin:0;}
.sh-modal-header button.sh-back{background:none;border:none;color:white;font-size:22px;cursor:pointer;line-height:1;padding:0;margin-right:8px;}
.sh-content{padding:12px 12px 80px;}
.sh-card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);}
.sh-card-hd{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#111;}
.sh-fg{margin-bottom:10px;}
.sh-fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.sh-fg input,.sh-fg select,.sh-fg textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;color:var(--text);background:#fafafa;outline:none;transition:border-color 0.2s;box-sizing:border-box;}
.sh-fg input:focus,.sh-fg select:focus{border-color:var(--rice);background:white;}
.sh-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sh-btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;}
.sh-btn-primary{background:linear-gradient(135deg,var(--rice),#1a3a2a);color:white;}
.sh-btn-ghost{background:white;color:var(--rice);border:1.5px solid var(--rice);}
.sh-btn:active{transform:scale(0.98);}
.sh-period-display{font-size:12px;color:var(--rice);font-weight:600;margin-top:3px;}
.sh-gauge-wrap{margin-bottom:14px;}
.sh-gauge-banner{display:flex;justify-content:space-between;align-items:center;border-radius:12px;padding:12px 16px;margin-bottom:10px;color:white;}
.sh-gauge-track-wrap{padding:0 4px;}
.sh-gauge-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.sh-gauge-labels span{font-size:10px;font-weight:700;color:#888;}
.sh-gauge-track{position:relative;height:32px;cursor:pointer;user-select:none;}
.sh-gauge-bg{position:absolute;top:50%;left:0;right:0;height:12px;transform:translateY(-50%);background:#e0e0e0;border-radius:6px;overflow:hidden;}
.sh-gauge-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .08s ease;}
.sh-gauge-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:white;border:3px solid;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;cursor:grab;transition:left .08s ease;touch-action:none;}
.sh-farm-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f3f4f6;}
.sh-farm-row:last-child{border-bottom:none;}
.sh-farm-row input{flex:1;min-width:0;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:#fafafa;outline:none;box-sizing:border-box;}
.sh-farm-row input:focus{border-color:var(--rice);}
.sh-farm-row button{background:#fee2e2;border:none;border-radius:6px;padding:6px 8px;color:#c0392b;font-size:13px;cursor:pointer;flex-shrink:0;}
.sh-add-row{width:100%;background:none;border:1.5px dashed var(--border);color:var(--muted);border-radius:6px;padding:6px;font-size:12px;cursor:pointer;margin-top:4px;font-family:inherit;}
.sh-add-row:hover{border-color:var(--rice);color:var(--rice);}
.sh-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.sh-photo-item{aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f3f4f6;position:relative;}
.sh-photo-item img{width:100%;height:100%;object-fit:cover;}
.sh-photo-item button{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);border:none;color:white;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:white;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;white-space:nowrap;z-index:9999;opacity:0;transition:all .28s;pointer-events:none;}
.sh-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── 소독·육묘 관리 스타일 ── */
.ds-input{border:2px solid #9ca3af;border-radius:10px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;background:#fff;box-sizing:border-box;}
.ds-input:focus{border-color:#16a34a;}
.ds-field-row{margin-bottom:14px;}
.ds-field-row>label{font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;}
.ds-field-row-inline{display:flex;align-items:center;gap:10px;margin-bottom:14px;min-height:38px;}
.ds-field-label-inline{font-size:13px;font-weight:700;color:#166534;flex:0 0 auto;width:110px;line-height:1.4;}
.ds-field-content-inline{flex:1;min-width:0;}
/* 소독육묘 통일 레이아웃 */
.ds-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;min-height:36px;}
.ds-label{font-size:13px;font-weight:700;color:#166534;flex:0 0 110px;line-height:1.4;padding-top:8px;}
.ds-content{flex:1;min-width:0;}
.ds-check-group{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}
.ds-check-label{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:14px;}
.ds-check-box{width:22px;height:22px;border-radius:5px;border:2px solid #9ca3af;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;transition:.15s;}
.ds-check-box.on{background:#16a34a;border-color:#16a34a;color:#fff;font-size:13px;font-weight:700;}
.ds-mini-cal{position:fixed;z-index:9100;background:#fff;border:1.5px solid #9ca3af;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:14px;width:260px;}
.ds-mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px;}
.ds-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:pointer;border:none;background:none;font-family:inherit;}
.ds-cal-day:hover{background:#dcfce7;color:#15803d;}
.ds-card{background:#fff;border-radius:16px;border:1px solid #d1fae5;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
</style>
</head>
<body><div id="root"></div>

<!-- ════════════════════════════════════════════
     파종현황 / 수확현황 모달 (순수 HTML/JS)
════════════════════════════════════════════ -->
<div id="shModal" style="display:none;" class="sh-modal-overlay">
  <div class="sh-modal-inner">
    <div class="sh-modal-header" style="justify-content:space-between;">
      <h2 id="shModalTitle">파종현황</h2>
      <button class="sh-back" style="margin-right:0;font-size:24px;font-weight:700;" onclick="closeShModal();history.back();">✕</button>
    </div>
    <div class="sh-content">
      <div id="sowingCards" style="display:none;"></div>
      <div id="sowingBtns" style="display:none;">
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="sh-btn sh-btn-primary" onclick="shSaveSowing()" style="flex:2;background:#16a34a;color:white;">💾 저장</button>
          <button class="sh-btn sh-btn-ghost" onclick="shResetSowing()" style="flex:1;font-size:12px;">초기화</button>
        </div>
        <div id="sowAddVarietyBtn" style="display:none;text-align:right;margin-top:8px;">
          <button onclick="addSowingVariety()" style="background:none;border:none;color:#16a34a;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;padding:4px 0;">+ 품종추가</button>
        </div>
      </div>
      <div id="harvestCards" style="display:none;"></div>
      <div id="harvestBtns" style="display:none;">
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button class="sh-btn sh-btn-primary" onclick="shSaveHarvest()" style="flex:2;background:#16a34a;color:white;">💾 저장</button>
          <button class="sh-btn sh-btn-ghost" onclick="shResetHarvest()" style="flex:1;font-size:12px;">초기화</button>
        </div>
        <div id="havAddVarietyBtn" style="display:none;text-align:right;margin-top:8px;">
          <button onclick="addHarvestVariety()" style="background:none;border:none;color:#16a34a;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;padding:4px 0;">+ 품종추가</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="shToast" class="sh-toast"></div>

<script>
// ════════ 파종/수확 공유 스토리지 ════════
const SH_KEY = 'seedfarm_sh_v1';
function shLoad() {
  try { return JSON.parse(localStorage.getItem(SH_KEY)||'{}'); } catch{return{};}
}
async function shSyncFromSupabase() {
  try {
    const [sowRes,havRes] = await Promise.all([
      _supa.from('sf_sowing').select('*'),
      _supa.from('sf_harvest').select('*'),
    ]);
    const db = shLoad();
    if(!db.sowingData) db.sowingData = {};
    if(!db.harvestData) db.harvestData = {};
    // 연도별 구조로 저장 {userId: {2026: [{...}]}} - shSaveSowing과 동일 구조
    (sowRes.data||[]).forEach(r=>{
      const card = {
        prodYear:r.prod_year||'',unit:r.unit||'',variety:r.variety||'',
        area:r.area||'',farmCount:r.farm_count||'',
        planM1:r.plan_m1||'',planD1:r.plan_d1||'',
        planM2:r.plan_m2||'',planD2:r.plan_d2||'',
        actM1:r.act_m1||'',actD1:r.act_d1||'',
        actM2:r.act_m2||'',actD2:r.act_d2||'',
        rate:r.rate||'0',note:r.note||'',farms:r.farms||[],
      };
      const yr = r.prod_year || String(new Date().getFullYear());
      if(!db.sowingData[r.user_key]) db.sowingData[r.user_key] = {};
      // 기존 localStorage에 같은 연도 데이터가 없을 때만 덮어씀
      if(!db.sowingData[r.user_key][yr]) {
        db.sowingData[r.user_key][yr] = [card];
      }
    });
    (havRes.data||[]).forEach(r=>{
      const card = {
        prodYear:r.prod_year||'',unit:r.unit||'',variety:r.variety||'',
        area:r.area||'',farmCount:r.farm_count||'',
        planM1:r.plan_m1||'',planD1:r.plan_d1||'',
        planM2:r.plan_m2||'',planD2:r.plan_d2||'',
        actM1:r.act_m1||'',actD1:r.act_d1||'',
        actM2:r.act_m2||'',actD2:r.act_d2||'',
        rate:r.rate||'0',note:r.note||'',farms:r.farms||[],
      };
      const yr = r.prod_year || String(new Date().getFullYear());
      if(!db.harvestData[r.user_key]) db.harvestData[r.user_key] = {};
      if(!db.harvestData[r.user_key][yr]) {
        db.harvestData[r.user_key][yr] = [card];
      }
    });
    try{localStorage.setItem(SH_KEY,JSON.stringify(db));}catch{}
    return db;
  } catch(e) {
    return shLoad();
  }
}
function shSave(data) {
  try { localStorage.setItem(SH_KEY, JSON.stringify(data)); } catch{}
  // Supabase에도 파종/수확 데이터 동기화
  // val이 {year: [cards]} 연도별 구조이므로 가장 최근 연도의 카드 배열을 꺼내서 전달
  if(data.sowingData){
    Object.entries(data.sowingData).forEach(([uid,val])=>{
      let cards;
      if(Array.isArray(val)) {
        cards = val; // 배열이면 그대로
      } else if(val && typeof val === 'object') {
        // 연도별 구조: {2026:[...]} → 가장 최근 연도 카드 꺼내기
        const years = Object.keys(val).sort().reverse();
        cards = years.length ? val[years[0]] : [];
      } else { cards = []; }
      if(cards && cards.length) svSpecialToSupabase('sf_sowing',uid,cards).catch(()=>{});
    });
  }
  if(data.harvestData){
    Object.entries(data.harvestData).forEach(([uid,val])=>{
      let cards;
      if(Array.isArray(val)) {
        cards = val;
      } else if(val && typeof val === 'object') {
        const years = Object.keys(val).sort().reverse();
        cards = years.length ? val[years[0]] : [];
      } else { cards = []; }
      if(cards && cards.length) svSpecialToSupabase('sf_harvest',uid,cards).catch(()=>{});
    });
  }
}
function shToast(msg) {
  const t = document.getElementById('shToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

// ════════ 모달 열기/닫기 ════════
let _shType = null;  // 'sowing' | 'harvest'
let _shUser = null;  // currentUser 객체

function openShModal(type, user) {
  _shType = type;
  _shUser = user;
  const modal = document.getElementById('shModal');
  modal.style.display = 'flex';
  const key = user?.id || 'unknown';
  const db = shLoad();
  const curYear = Math.max(new Date().getFullYear(), 2026);
  if (type === 'sowing') {
    document.getElementById('shModalTitle').textContent = '🌱 파종현황';
    document.getElementById('sowingCards').style.display = 'block';
    document.getElementById('sowingBtns').style.display = 'block';
    document.getElementById('harvestCards').style.display = 'none';
    document.getElementById('harvestBtns').style.display = 'none';
    const userSowing = db.sowingData?.[key];
    let saved = [];
    if (userSowing) {
      if (Array.isArray(userSowing)) { saved = userSowing; }
      else { saved = userSowing[curYear] || []; }
    }
    renderSowingCards(saved.length ? saved : [{}], user);
  } else {

const SOW_CROP_GROUPS = {"벼":["벼"],"콩":["콩"],"맥류":["보리","밀","트리티케일"]};

function showSowingOverview(group) {
  let allUsers = [];
  try { const d = JSON.parse(localStorage.getItem('seedfarm_v8')||'{}'); allUsers = d.users||[]; } catch{}

  const shDb = shLoad();
  const crops = SOW_CROP_GROUPS[group] || [];
  const members = allUsers
    .filter(u => u.role !== 'admin' && crops.includes(u.crop))
    .map(u => {
      const saved = shDb.sowingData?.[u.id];
      const d = (saved && saved[0]) ? saved[0] : null;
      return {
        danjiName: u.danjiName || '-',
        variety:   u.variety   || '-',
        area:      parseFloat(d?.area ?? u.area) || 0,
        farmCount: d?.farmCount || u.farmCount || '-',

  const icon = group==='벼'?'🌾':group==='콩'?'🫛':'🌿';

  const sowedArea   = members.reduce((s,m)=>s+(m.hasSaved ? m.area*(m.rate/100) : 0), 0);

function formatPeriod(d1, d2) {
  const fmt = d => { const [,m,day] = d.split('-'); return `${parseInt(m)}.${parseInt(day)}`; };
  return d1 && d2 ? `📅 ${fmt(d1)} ~ ${fmt(d2)}` : '';
}

function updateSowTotalPeriod() {
  document.querySelectorAll('.sow-card').forEach(card=>{
    const rows = card.querySelectorAll('.sow-farm-row');
    const allDates = [];
    rows.forEach(row => {
      const d1 = row.querySelector('.sow-farm-date1')?.value;
      const d2 = row.querySelector('.sow-farm-date2')?.value;
      if(d1) allDates.push(new Date(d1));
      if(d2) allDates.push(new Date(d2));
    });
    if(allDates.length < 1) return;
    const min = new Date(Math.min(...allDates)), max = new Date(Math.max(...allDates));

    // 단지 파종(이앙) 실시일 자동 입력
    const pad2 = n => String(n).padStart(2,'0');
    const m1=min.getMonth()+1, d1=min.getDate();
    const actTxt1=card.querySelector('.sow-act-d1-text');
    const actHidM1=card.querySelector('.sow-act-m1');
    const actHidD1=card.querySelector('.sow-act-d1');
    if(actTxt1) actTxt1.value=`${pad2(m1)}.${pad2(d1)}`;
    if(actHidM1) actHidM1.value=m1;
    if(actHidD1) actHidD1.value=d1;
    const m2=max.getMonth()+1, d2=max.getDate();
    const actTxt2=card.querySelector('.sow-act-d2-text');
    const actHidM2=card.querySelector('.sow-act-m2');

    if(actHidM2) actHidM2.value=m2;
    if(actHidD2) actHidD2.value=d2;
  });
}

/* 파종 게이지 */
function buildRateGauge(containerId, rate, color, acreage) {
  const pct = Math.min(100,Math.max(0,Number(rate)||0));
  const area = parseFloat(acreage)||0;
  const doneArea = area ? (area*pct/100).toFixed(2) : null;
  return `<div id="${containerId}" data-rate="${pct}" data-saved-rate="${pct}" data-area="${area}" data-color="${color}">
    <div data-banner style="display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,${color},${color}cc);border-radius:12px;padding:12px 16px;margin-bottom:10px;color:white;">
      <div><div style="font-size:11px;opacity:.8;font-weight:600;margin-bottom:2px;">파종(이앙)률</div><div data-pct-display style="font-size:28px;font-weight:900;line-height:1;">${pct}<span style="font-size:14px;font-weight:700;">%</span></div></div>
      <div style="text-align:right;"><div style="font-size:11px;opacity:.8;font-weight:600;margin-bottom:2px;">파종 면적</div>
      <div data-area-display style="font-size:17px;font-weight:900;line-height:1;">${doneArea!==null?`${doneArea} <span style="font-size:11px;font-weight:700;">/ ${area} ha</span>`:'<span style="font-size:12px;opacity:.7;">면적 미입력</span>'}</div></div>
    </div>
    <div style="padding:0 4px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">${[0,25,50,75,100].map(v=>`<span style="font-size:10px;font-weight:700;color:#888;">${v}%</span>`).join('')}</div>
      <div data-track style="position:relative;height:34px;cursor:pointer;user-select:none;"
        onmousedown="sowDragStart(event,'${containerId}')" ontouchstart="sowDragStart(event,'${containerId}')">
        <div style="position:absolute;top:50%;left:0;right:0;height:12px;transform:translateY(-50%);background:#e0e0e0;border-radius:6px;overflow:hidden;">
          <div data-progress style="position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:linear-gradient(90deg,#43a047,#2e7d32);border-radius:6px;transition:width .08s;"></div>
        </div>
        <div data-handle style="position:absolute;top:50%;left:${pct}%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:white;border:3px solid #2e7d32;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;cursor:grab;transition:left .08s;touch-action:none;"><span style="font-size:12px;">🌱</span></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
      <label style="font-size:11px;font-weight:700;color:#374151;white-space:nowrap;">직접 입력:</label>
      <input type="number" min="0" max="100" value="${pct}" data-num-input
        oninput="(function(el){var v=Math.min(100,Math.max(0,parseInt(el.value)||0));_applySowGauge('${containerId}',v);})(this)"
        style="width:64px;border:1.5px solid ${color};border-radius:7px;padding:5px 6px;font-size:13px;font-family:inherit;text-align:center;outline:none;box-sizing:border-box;">
      <span style="font-size:13px;font-weight:700;color:#374151;">%</span>
    </div>
    <div style="font-size:11px;font-weight:700;color:#1b5e20;text-align:center;margin-top:6px;">🌱 핸들을 드래그하거나 숫자를 직접 입력하세요</div>
  </div>`;
}
function _applySowGauge(id,val){
  const c=document.getElementById(id); if(!c)return;
  const saved=parseInt(c.dataset.savedRate)||0;
  val=Math.max(val,saved);
  const area=parseFloat(c.dataset.area)||0; c.dataset.rate=val;
  const pctEl=c.querySelector('[data-pct-display]'); if(pctEl) pctEl.innerHTML=`${val}<span style="font-size:14px;font-weight:700;">%</span>`;
  const aEl=c.querySelector('[data-area-display]'); if(aEl) aEl.innerHTML=area?`${(area*val/100).toFixed(2)} <span style="font-size:11px;font-weight:700;">/ ${area} ha</span>`:'<span style="font-size:12px;opacity:.7;">면적 미입력</span>';
  const p=c.querySelector('[data-progress]'),h=c.querySelector('[data-handle]');
  if(p) p.style.width=val+'%'; if(h) h.style.left=val+'%';
  const ni=c.querySelector('[data-num-input]'); if(ni&&document.activeElement!==ni) ni.value=val;
}
let _sowDrag=null;
function sowDragStart(e,id){
  e.preventDefault(); _sowDrag=id;
  const move=ev=>{if(!_sowDrag)return;const t=document.getElementById(_sowDrag).querySelector('[data-track]');const r=t.getBoundingClientRect();const cx=ev.touches?ev.touches[0].clientX:ev.clientX;_applySowGauge(_sowDrag,Math.round(Math.min(100,Math.max(0,(cx-r.left)/r.width*100))));};
  const end=()=>{_sowDrag=null;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',end);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',end);
  document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end);move(e);
}
function onSowAreaChange(input){const c=input.closest('.card');const a=parseFloat(input.value)||0;const g=c.querySelector('[data-rate][data-color]');if(!g)return;g.dataset.area=a;_applySowGauge(g.id,parseInt(g.dataset.rate)||0);}

function _applyHavGauge(id,val){
  const c=document.getElementById(id); if(!c)return;

  const pctEl=c.querySelector('[data-pct-display]'); if(pctEl) pctEl.innerHTML=`${val}<span style="font-size:14px;font-weight:700;">%</span>`;
  const aEl=c.querySelector('[data-area-display]'); if(aEl) aEl.innerHTML=area?`${(area*val/100).toFixed(2)} <span style="font-size:11px;font-weight:700;">/ ${area} ha</span>`:'<span style="font-size:12px;opacity:.7;">면적 미입력</span>';
  const p=c.querySelector('[data-progress]'),h=c.querySelector('[data-handle]');
  if(p) p.style.width=val+'%'; if(h) h.style.left=val+'%';
  const ni=c.querySelector('[data-num-input]'); if(ni&&document.activeElement!==ni) ni.value=val;
}

  const end=()=>{_havDrag=null;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',end);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end);};
  document.addEventListener('mousemove',move);document.addEventListener('mouseup',end);

}

/* 파종 카드 렌더 */
function renderSowingCards(data, user){
  const wrap=document.getElementById('sowingCards'); wrap.innerHTML='';
  const list=(data&&data.length)?data:[{}];
  list.forEach((d,idx)=>{
    const card=document.createElement('div');
    card.className='card sow-card';
    card.style.cssText=`padding:14px;margin-bottom:${idx<list.length-1?'14px':'10px'};${idx>0?'border-top:2px dashed #d1fae5;':''}`;
    card.innerHTML=_makeSowingCardHTML(d,user,idx);
    wrap.appendChild(card);
  });
  // +품종추가 버튼: dual/admin이고 MY 품종 수가 2개 이상일 때만 표시
  const addBtn=document.getElementById('sowAddVarietyBtn');
  if(addBtn){
    const canAdd=(user?.role==='dual'||user?.role==='admin');
    addBtn.style.display=canAdd?'block':'none';
    _updateSowAddBtn();
  }
}

/* +품종추가 버튼 활성/비활성 갱신 */
function _updateSowAddBtn(){
  const addBtn=document.getElementById('sowAddVarietyBtn');
  if(!addBtn||!_shUser) return;
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser.id}`)||'[]').length;}catch{}
  const maxCards=evLen; // extra_varieties 개수만큼 카드 허용 (품종1~N)
  const curCards=document.querySelectorAll('#sowingCards .sow-card').length;
  const btn=addBtn.querySelector('button');
  if(btn){
    btn.disabled=curCards>=maxCards;
    btn.style.color=curCards>=maxCards?'#9ca3af':'#16a34a';
    btn.style.cursor=curCards>=maxCards?'default':'pointer';
  }
}

/* 카드 제거 */
function removeSowingCard(btn){
  const card=btn.closest('.sow-card');
  if(card) card.remove();
  document.querySelectorAll('#sowingCards .sow-card').forEach((c,i)=>{
    const label=c.querySelector('span[style*="font-weight:900"]');
    if(label) label.firstChild && (label.firstChild.textContent=i>0?`품종 ${i+1}`:'');
  });
  _updateSowAddBtn();
}

/* +품종추가 클릭 */
function addSowingVariety(){
  const wrap=document.getElementById('sowingCards');
  const idx=wrap.querySelectorAll('.sow-card').length;
  // 첫 번째 카드의 현재 연도 가져오기
  const firstYear=document.querySelector('#sowingCards .sow-card .sow-year')?.value||Math.max(new Date().getFullYear(),2026);
  // MY extra_varieties에서 해당 인덱스 품종 기본값 가져오기
  let evData={};
  try{
    const ev=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]');
    if(ev[idx]) evData={prodYear:firstYear,unit:_shUser?.danjiName||'',variety:ev[idx].variety||'',area:ev[idx].area||'',farmCount:ev[idx].farmCount||''};
    else evData={prodYear:firstYear};
  }catch{ evData={prodYear:firstYear}; }
  // 최대 카드 수 체크
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]').length;}catch{}
  if(idx>=evLen) return;
  const card=document.createElement('div');
  card.className='card sow-card';
  card.style.cssText='padding:14px;margin-bottom:10px;border-top:2px dashed #d1fae5;';
  card.innerHTML=_makeSowingCardHTML(evData,_shUser,idx);
  wrap.appendChild(card);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  _updateSowAddBtn();
}

    wrap.appendChild(card);
  });
  // +품종추가 버튼: dual/admin만 표시
  const addBtn=document.getElementById('havAddVarietyBtn');
  if(addBtn){
    const canAdd=(user?.role==='dual'||user?.role==='admin');
    addBtn.style.display=canAdd?'block':'none';
    _updateHavAddBtn();
  }
}

/* +품종추가 버튼 활성/비활성 갱신 */
function _updateHavAddBtn(){
  const addBtn=document.getElementById('havAddVarietyBtn');
  if(!addBtn||!_shUser) return;
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser.id}`)||'[]').length;}catch{}
  const curCards=document.querySelectorAll('#harvestCards .hav-card').length;
  const btn=addBtn.querySelector('button');
  if(btn){
    btn.disabled=curCards>=evLen;
    btn.style.color=curCards>=evLen?'#9ca3af':'#16a34a';
    btn.style.cursor=curCards>=evLen?'default':'pointer';
  }
}

/* 수확 카드 제거 */
function removeHarvestCard(btn){
  const card=btn.closest('.hav-card');
  if(card) card.remove();
  document.querySelectorAll('#harvestCards .hav-card').forEach((c,i)=>{
    const label=c.querySelector('span[style*="font-weight:900"]');
    if(label) label.textContent=i>0?`품종 ${i+1}`:'';
  });
  _updateHavAddBtn();
}

/* +품종추가 클릭 */
function addHarvestVariety(){
  const wrap=document.getElementById('harvestCards');
  const idx=wrap.querySelectorAll('.hav-card').length;
  // 최대 카드 수 체크
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]').length;}catch{}
  if(idx>=evLen) return;
  const firstYear=document.querySelector('#harvestCards .hav-card .hav-year')?.value||Math.max(new Date().getFullYear(),2026);
  let evData={prodYear:firstYear};
  try{
    const ev=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]');
    if(ev[idx]) evData={prodYear:firstYear,unit:_shUser?.danjiName||'',variety:ev[idx].variety||'',area:ev[idx].area||'',farmCount:ev[idx].farmCount||''};
  }catch{}
  const card=document.createElement('div');
  card.className='card hav-card';
  card.style.cssText='padding:14px;margin-bottom:10px;border-top:2px dashed #d1fae5;';
  card.innerHTML=_makeHarvestCardHTML(evData,_shUser,idx);
  wrap.appendChild(card);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  _updateHavAddBtn();
}

/* 데이터 수집 */
function getSowingCards(){
  const cards=document.querySelectorAll('#sowingCards .sow-card');
  if(!cards.length) return [];
  return Array.from(cards).map(card=>{
    const g=card.querySelector('[data-rate]');
    const farms=Array.from(card.querySelectorAll('.sow-farm-row')).map(r=>({name:r.querySelector('.sow-farm-name')?.value.trim()||'',date1:r.querySelector('.sow-farm-date1')?.value||'',date2:r.querySelector('.sow-farm-date2')?.value||''}));
    return{
      prodYear: card.querySelector('.sow-year')?.value||'',
      unit:     card.querySelector('.sow-unit')?.value.trim()||'',
      variety:  card.querySelector('.sow-variety')?.value.trim()||'',
      area:     card.querySelector('.sow-area')?.value||'',
      farmCount:card.querySelector('.sow-farm-count')?.value||'',
      planM1:   card.querySelector('.sow-plan-m1')?.value||'',
      planD1:   card.querySelector('.sow-plan-d1')?.value||'',
      planM2:   card.querySelector('.sow-plan-m2')?.value||'',
      planD2:   card.querySelector('.sow-plan-d2')?.value||'',
      actM1:    card.querySelector('.sow-act-m1')?.value||'',
      actD1:    card.querySelector('.sow-act-d1')?.value||'',
      actM2:    card.querySelector('.sow-act-m2')?.value||'',
      actD2:    card.querySelector('.sow-act-d2')?.value||'',
      farms,
      rate:     g?g.dataset.rate:'0',
      note:     card.querySelector('.sow-note')?.value.trim()||''
    };
  });
}
function getHarvestCards(){
  const cards=document.querySelectorAll('#harvestCards .hav-card');
  if(!cards.length) return [];
  return Array.from(cards).map(card=>{
    const g=card.querySelector('[data-rate]');
    const farms=Array.from(card.querySelectorAll('.hav-farm-row')).map(r=>({name:r.querySelector('.hav-farm-name')?.value.trim()||'',date1:r.querySelector('.hav-farm-date1')?.value||'',date2:r.querySelector('.hav-farm-date2')?.value||''}));
    return{prodYear:card.querySelector('.hav-year')?.value||'',unit:card.querySelector('.hav-unit')?.value.trim()||'',variety:card.querySelector('.hav-variety')?.value.trim()||'',area:card.querySelector('.hav-area')?.value||'',farmCount:card.querySelector('.hav-farm-count')?.value||'',planM1:card.querySelector('.hav-plan-m1')?.value||'',planD1:card.querySelector('.hav-plan-d1')?.value||'',planM2:card.querySelector('.hav-plan-m2')?.value||'',planD2:card.querySelector('.hav-plan-d2')?.value||'',actM1:card.querySelector('.hav-act-m1')?.value||'',actD1:card.querySelector('.hav-act-d1')?.value||'',actM2:card.querySelector('.hav-act-m2')?.value||'',actD2:card.querySelector('.hav-act-d2')?.value||'',farms,rate:g?g.dataset.rate:'0',note:card.querySelector('.hav-note')?.value.trim()||''};
  });
}
</script>
