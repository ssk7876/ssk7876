/* ════════════════════ DISASTER FORM ════════════════════ */
function DisasterForm({app,onBack,editItem,onSave,year}){
  const u=app.currentUser;
  const SK="seedfarm_disaster_v1";
  const selYear=year||Math.max(new Date().getFullYear(),2026);
  const blank={type:"",location:"",date:"",scale:"",damage:"",action:"",photos:[],variety:""};
  const isDual=u?.role==='dual'||u?.role==='admin';
  let myExtras=[];
  try{myExtras=JSON.parse(localStorage.getItem(`extra_varieties_${u?.id}`)||'[]');}catch{}
  const maxForms=myExtras.length;
  // 초기 forms: variety를 MY 품종1 기본값으로 설정
  const initForm={...blank,variety:myExtras[0]?.variety||u?.variety||""};
  const[forms,setForms]=useState(editItem?[editItem]:[initForm]);
  const[saved,setSaved]=useState(false);
  const fset=(i,k,v)=>{setForms(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});setSaved(false);};
  const resetForm=(i)=>{if(!confirm("이 항목을 초기화하시겠습니까?"))return;setForms(p=>{const n=[...p];n[i]={...blank};return n;});setSaved(false);};
  const removeForm=(i)=>setForms(p=>p.filter((_,idx)=>idx!==i));
  const addForm=()=>{if(forms.length>=maxForms)return;const nextEv=myExtras[forms.length]||{};setForms(p=>[...p,{...blank,variety:nextEv.variety||"",area:nextEv.area||"",farmCount:nextEv.farmCount||""}]);};
  const doSave=()=>{
    try{
      const storageKey=`${u?.id||"unknown"}_${selYear}`;
      const db=JSON.parse(localStorage.getItem(SK)||"{}");
      let list=Array.isArray(db[storageKey])?db[storageKey]:db[storageKey]?[db[storageKey]]:[];
      const now=new Date().toISOString();
      if(editItem?._id){
        const idx=list.findIndex(r=>r._id===editItem._id);
        const f=forms[0];
        if(idx>=0)list[idx]={...f,_id:editItem._id,savedAt:now};
        else list.push({...f,_id:editItem._id,savedAt:now});
      }else{
        forms.forEach((f,i)=>{list.unshift({...f,_id:`${Date.now()}_${i}`,savedAt:now});});
      }
      db[storageKey]=list;
      localStorage.setItem(SK,JSON.stringify(db));
    }catch{}
    setSaved(true);
    setTimeout(()=>{setSaved(false);onSave();},1000);
  };
  const addPhotos=(i,e)=>{
    Array.from(e.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{setForms(p=>{const n=[...p];n[i]={...n[i],photos:[...(n[i].photos||[]),ev.target.result]};return n;});};
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };
  const removePhoto=(i,pi)=>fset(i,'photos',(forms[i].photos||[]).filter((_,idx)=>idx!==pi));
  const inp=(i,k,ph,type="text")=>(
    <input type={type} value={forms[i][k]} onChange={e=>fset(i,k,e.target.value)} placeholder={ph}
      style={{width:"100%",boxSizing:"border-box",border:"1.5px solid #d1d5db",borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",fontFamily:"inherit",background:"#fafafa"}}
      onFocus={e=>e.target.style.borderColor="#dc2626"} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>
  );
  const renderCard=(fi)=>{
    const ev=myExtras[fi]||{};
    // 2품종생산: 품종 선택 가능 (forms[fi].variety로 관리)
    const varietyOptions=isDual&&myExtras.length>0
      ?myExtras.map((e,i)=>e.variety||`품종 ${i+1}`).filter(Boolean)
      :[];
    const selectedVariety=forms[fi]?.variety||(ev.variety||u?.variety||"—");

    const f=forms[fi];
    return(
      <div key={fi} style={{marginBottom:12}}>
        {fi>0&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:900,color:"#dc2626"}}>품종 {fi+1}</span>
            <button onClick={()=>removeForm(fi)} style={{background:"none",border:"none",color:"#ef4444",fontSize:18,cursor:"pointer",padding:0,lineHeight:1}}>✕</button>
          </div>
        )}
        <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,alignItems:"center"}}>
            {/* 단지명 */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>📍 단지명</div>
              <div style={{fontSize:13,fontWeight:900,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u?.danjiName||"—"}</div>
            </div>
            {/* 품종명 */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>🌱 품종명</div>
              {isDual&&varietyOptions.length>0
                ?<select value={selectedVariety}
                    onChange={e=>{
                      const chosen=e.target.value;
                      const idx=varietyOptions.indexOf(chosen);
                      const chosenEv=myExtras[idx]||{};
                      setForms(p=>{const n=[...p];n[fi]={...n[fi],variety:chosen,area:chosenEv.area||"",farmCount:chosenEv.farmCount||""};return n;});
                    }}
                    style={{width:"100%",border:"1.5px solid #d1d5db",borderRadius:8,padding:"4px 2px",fontSize:12,fontFamily:"inherit",outline:"none",background:"white",cursor:"pointer",textAlign:"center"}}>
                    {varietyOptions.map(v=><option key={v} value={v}>{v}</option>)}
                  </select>
                :<div style={{fontSize:13,fontWeight:900,color:"#111827",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.variety||u?.variety||"—"}</div>
              }
            </div>
            {/* 면적 */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>🌾 면적(ha)</div>
              <div style={{fontSize:13,fontWeight:900,color:"#111827"}}>{forms[fi]?.area||ev.area||u?.area||"—"}</div>
            </div>
            {/* 농가수 */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b7280",marginBottom:3}}>🏠 농가수</div>
              <div style={{fontSize:13,fontWeight:900,color:"#111827"}}>{forms[fi]?.farmCount||ev.farmCount||u?.farmCount||"—"}</div>
            </div>
          </div>
        </div>
        <div style={{background:"white",borderRadius:14,padding:16,marginBottom:10,border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <p style={{fontWeight:900,color:"#111827",fontSize:14,margin:"0 0 14px"}}>📋 발생 정보 입력</p>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>재해 / 병해충 종류 *</label>
            {["태풍 피해","가뭄 피해","병해","충해"].includes(f.type)||f.type===""
              ?(<select value={f.type} onChange={e=>fset(fi,"type",e.target.value)}
                  style={{width:"100%",boxSizing:"border-box",border:"1.5px solid #d1d5db",borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",fontFamily:"inherit",background:"#fafafa"}}
                  onFocus={e=>e.target.style.borderColor="#dc2626"} onBlur={e=>e.target.style.borderColor="#d1d5db"}>
                  <option value="">선택하세요</option>
                  {["태풍 피해","가뭄 피해","병해","충해","기타"].map(v=>(<option key={v} value={v}>{v}</option>))}
                </select>)
              :(<input type="text" value={f.type} onChange={e=>fset(fi,"type",e.target.value)} placeholder="내용을 입력하세요" autoFocus
                  style={{width:"100%",boxSizing:"border-box",border:"1.5px solid #dc2626",borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",fontFamily:"inherit",background:"#fafafa"}}
                  onBlur={e=>e.target.style.borderColor="#d1d5db"}/>)
            }
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>발생 위치</label>
            {inp(fi,"location","예: OO리 1234-1번지")}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>발생 일자</label>{inp(fi,"date","","date")}</div>
            <div><label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>피해 규모(ha)</label>{inp(fi,"scale","0.00","number")}</div>

            <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>피해 내용</label>

              onFocus={e=>e.target.style.borderColor="#dc2626"} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>

                    <img src={src} alt={`사진${pi+1}`} style={{width:"100%",height:"100%",objectFit:"cover"}}/>

            <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",boxSizing:"border-box",padding:"12px",border:"2px dashed #fca5a5",borderRadius:10,background:"#fff5f5",color:"#dc2626",fontSize:13,fontWeight:700,cursor:"pointer"}}>

          </button>
          <button onClick={()=>resetForm(fi)} style={{flex:1,background:"white",color:"#dc2626",border:"1.5px solid #dc2626",borderRadius:14,padding:"16px 0",fontSize:14,fontWeight:900,cursor:"pointer"}}>

        </div>
      </div>

  };
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:100}}>
      <div style={{background:"#dc2626",padding:"16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>🚨 재해 및 병해충 발생 상황 {editItem?"수정":"작성"}</h1>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:24,cursor:"pointer",lineHeight:1,padding:"0 4px",fontWeight:700}}>✕</button>
      </div>
      <div style={{padding:"16px"}}>
        {forms.map((_,fi)=>renderCard(fi))}
      </div>
    </div>
  );
}

/* ════════════════════ DISASTER SCREEN ════════════════════ */
function DisasterScreen({app,setApp,onBack}){
  const u=app.currentUser;
  const SK="seedfarm_disaster_v1";
  const PAGE_SIZE=10;
  const curY=Math.max(new Date().getFullYear(),2026);
  const[writing,setWriting]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[page,setPage]=useState(0);
  const[tick,setTick]=useState(0);
  const[selYear,setSelYear]=useState(curY);

  const storageKey=`${u?.id||"unknown"}_${selYear}`;

  const loadList=()=>{
    try{
      const db=JSON.parse(localStorage.getItem(SK)||"{}");
      const raw=db[storageKey];
      if(!raw)return[];
      if(Array.isArray(raw))return raw;
      return[raw];
    }catch{return[];}
  };

  const deleteItem=(id)=>{
    if(!confirm("이 기록을 삭제하시겠습니까?"))return;
    try{
      const db=JSON.parse(localStorage.getItem(SK)||"{}");
      const list=Array.isArray(db[storageKey])?db[storageKey]:db[storageKey]?[db[storageKey]]:[];
      db[storageKey]=list.filter(r=>r._id!==id);
      localStorage.setItem(SK,JSON.stringify(db));
      setTick(t=>t+1);
    }catch{}
  };

  if(writing||editItem){
    return<DisasterForm app={app} editItem={editItem} year={selYear}
      onBack={()=>{setWriting(false);setEditItem(null);}}
      onSave={()=>{setWriting(false);setEditItem(null);setTick(t=>t+1);}}/>;
  }

  const list=loadList();
  const totalPages=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  const paged=list.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:100}}>
      <div style={{background:"#dc2626",padding:"16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>🚨 재해 및 병해충 발생 상황</h1>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:24,cursor:"pointer",lineHeight:1,padding:"0 4px",fontWeight:700}}>✕</button>
      </div>
      {/* 연도 select */}
      <div style={{padding:"12px 16px 0",display:"flex",alignItems:"center",gap:10}}>
        <label style={{fontSize:13,fontWeight:700,color:"#374151"}}>📅 연도</label>
        <select value={selYear} onChange={e=>{setSelYear(Number(e.target.value));setPage(0);}}
          style={{border:"2px solid #dc2626",borderRadius:10,padding:"7px 12px",fontWeight:900,fontSize:14,color:"#dc2626",background:"white",outline:"none",cursor:"pointer"}}>
          {Array.from({length:5},(_,i)=>2026+i).map(y=>(
            <option key={y} value={y}>{y}년</option>
          ))}
        </select>
      </div>
      <div style={{padding:"12px 16px 0"}}>
        {/* 기록 목록 표 */}
        <div style={{background:"white",borderRadius:14,overflow:"hidden",border:"1px solid #e5e7eb",boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:16}}>
          {/* 표 헤더 */}
          <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.6fr",background:"#dc2626",color:"white",fontWeight:900,fontSize:12,textAlign:"center"}}>
            {["단지명","품종명","보고일자","피해규모(ha)",""].map((h,i,arr)=>(
              <div key={i} style={{padding:"10px 4px",borderRight:i<arr.length-1?"1px solid #b91c1c":"none"}}>{h}</div>
            ))}
          </div>
          {list.length===0
            ?<p style={{textAlign:"center",color:"#9ca3af",padding:"32px 0",fontSize:13}}>아직 작성된 기록이 없습니다.</p>
            :paged.map((r,i)=>(
              <div key={r._id||i} style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.6fr",textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#fef2f2",alignItems:"center"}}>
                <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u?.danjiName||"—"}</div>
                <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.variety||u?.variety||"—"}</div>
                <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:"#374151"}}>{r.date||"—"}</div>
                <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:"#374151"}}>{r.scale||"—"}</div>
                <div style={{padding:"6px 4px",display:"flex",gap:4,justifyContent:"center"}}>
                  <button onClick={()=>setEditItem(r)}
                    style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"4px 6px",fontSize:11,color:"#dc2626",cursor:"pointer",fontWeight:700}}>수정</button>
                  <button onClick={()=>deleteItem(r._id)}
                    style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:6,padding:"4px 6px",fontSize:11,color:"#b91c1c",cursor:"pointer",fontWeight:700}}>삭제</button>
                </div>
              </div>
            ))
          }
        </div>
        {/* 페이지네이션 */}
        {totalPages>1&&(
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginBottom:16}}>
            <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
              style={{padding:"8px 16px",borderRadius:12,border:"2px solid #dc2626",background:"white",color:"#dc2626",fontWeight:900,fontSize:13,cursor:"pointer",opacity:page===0?.3:1}}>‹ 이전</button>
            <span style={{fontSize:13,fontWeight:700,color:"#6b7280"}}>{page+1} / {totalPages}</span>
            <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
              style={{padding:"8px 16px",borderRadius:12,border:"2px solid #dc2626",background:"white",color:"#dc2626",fontWeight:900,fontSize:13,cursor:"pointer",opacity:page===totalPages-1?.3:1}}>다음 ›</button>
          </div>
        )}
        {/* 작성하기 버튼 */}
        <button onClick={()=>setWriting(true)}
          style={{width:"100%",background:"#dc2626",color:"white",border:"none",borderRadius:14,padding:"16px 0",fontSize:16,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 12px rgba(220,38,38,.3)"}}>
          ✏️ 작성하기
        </button>
      </div>
    </div>
  );
}

/* ════════════════════ RECORD SCREEN ════════════════════ */
function RecordScreen({app,setApp,initDisaster,recordSelRef}){
  const today=new Date();
  const[sel,setSel]=useState(initDisaster?"disaster":null);
  const[selMonth,setSelMonth]=useState(today.getMonth()+1);
  const[selYear,setSelYear]=useState(Math.max(today.getFullYear(),2026));

  const productionBackRef=useRef(null);

  // sel 변경 시 recordSelRef 업데이트 (App의 popstate가 감지)
  useEffect(()=>{
    if(recordSelRef){
      recordSelRef.current = sel ? ()=>{ setSel(null); setSelMonth(null); } : null;
    }
    // sel 진입 시 history entry 추가 (안드로이드 뒤로가기용)
    if(sel) history.pushState({recordSel:sel},"","");
  },[sel]);
  // sel 변경
  const goSel=(key)=>setSel(key);

  if(sel==="production"){
    productionBackRef.current=()=>{ setSel(null); setSelMonth(null); };
    return<MonthForm month={today.getMonth()+1} year={Math.max(today.getFullYear(),2026)}
      app={app} setApp={setApp} onBack={()=>history.back()}
      selMonth={today.getMonth()+1} setSelMonth={setSelMonth}
      selYear={Math.max(today.getFullYear(),2026)} setSelYear={setSelYear}/>;
  }
  if(sel==="disseed")return<DisSeedScreen app={app} onBack={()=>history.back()}/>;
  if(sel==="disaster")return<DisasterScreen app={app} setApp={setApp} onBack={()=>history.back()}/>;
  const isBye=app.currentUser?.crop==="벼";
  const menuItems=[
    {key:"disaster",  icon:"🚨",color:"#fee2e2",label:"재해 및 병해충 발생 상황",  desc:"재해·병해충 발생 상황 보고"},
    {key:"production",icon:"📋",color:"#dcfce7",label:"생산관리지도부",           desc:"월별 활동 내역 작성 및 발송"},
    ...(isBye?[{key:"disseed",icon:"🧪",color:"#fef9c3",label:"소독 · 육묘 관리",desc:"침종(소독) 및 육묘 관리 입력"}]:[]),
    {key:"sowing",    icon:"🌱",color:"#dbeafe",label:"파종현황",                 desc:"파종(이앙) 실적 입력 및 저장"},
    {key:"harvest",   icon:"🌾",color:"#fef3c7",label:"수확현황",                 desc:"수확 실적 입력 및 저장"},
  ];
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:90}}>
      <div style={{background:"#16a34a",padding:"16px"}}>
        <h1 style={{fontSize:20,fontWeight:900,color:"white",margin:0}}>📋 기록</h1>
      </div>
      {menuItems.map(item=>(
        <button key={item.key} onClick={()=>{
          if(item.key==="sowing"){ history.pushState({shModal:"sowing"},"",""); openShModal("sowing",app.currentUser);}
          else if(item.key==="harvest"){ history.pushState({shModal:"harvest"},"",""); openShModal("harvest",app.currentUser);}
          else goSel(item.key);
        }}
          style={{width:"100%",display:"flex",alignItems:"center",gap:16,background:"white",padding:"18px 20px",borderBottom:"1px solid #f3f4f6",borderLeft:"none",borderRight:"none",borderTop:"none",cursor:"pointer",textAlign:"left"}}>
          <div style={{width:52,height:52,background:item.color,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:26}}>{item.icon}</span></div>
          <div style={{flex:1}}>
            <p style={{fontWeight:900,color:"#111827",fontSize:16,margin:"0 0 3px"}}>{item.label}</p>
            <p style={{fontSize:12,color:"#9ca3af",margin:0}}>{item.desc}</p>
          </div>
          <span style={{color:"#d1d5db",fontSize:22,fontWeight:700}}>›</span>
        </button>
      ))}
    </div>
  );
}

/* ════════════════════ ADMIN SOWING SCREEN ════════════════════ */
function AdminSowingScreen({app,onBack}){
  const[sel,setSel]=useState(null);
  const[selYear,setSelYear]=useState(Math.max(new Date().getFullYear(),2026));
  const yearSt={border:"2px solid #16a34a",borderRadius:10,padding:"7px 12px",fontWeight:900,fontSize:14,color:"#16a34a",background:"white",outline:"none",cursor:"pointer"};

  const getMembers=(group)=>{
    const crops=SOW_CROP_GROUPS[group]||[];
    let shDb={};
    try{shDb=JSON.parse(localStorage.getItem('seedfarm_sh_v1')||'{}');}catch{}
    return app.users
      .filter(u=>u.role!=='admin'&&crops.includes(u.crop))
      .map(u=>{
        const userSowing=shDb.sowingData?.[u.id];
        // 연도별 구조 지원
        let saved;
        if(!userSowing) saved=null;
        else if(Array.isArray(userSowing)) saved=userSowing;
        else saved=userSowing[selYear]||[];
        const d=(saved&&saved[0])?saved[0]:null;
        return{
          danjiName:u.danjiName||'—',
          variety:  u.variety||'—',
          crop:     u.crop||'—',
          area:parseFloat(d?.area??u.area)||0,
          farmCount:d?.farmCount||u.farmCount||'—',
          rate:d?(parseFloat(d.rate)||0):null,
          hasSaved:!!d,
          planM1:d?.planM1||'', planD1:d?.planD1||'',
          planM2:d?.planM2||'', planD2:d?.planD2||'',
        };
      });
  };

  const cropIcon=g=>g==='벼'?'🌾':g==='콩'?'🫛':'🌿';

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:90}}>
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>🌱 파종현황</h1>
      </div>
      <div style={{padding:"16px"}}>
        {/* 생산연도 */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <label style={{fontSize:13,fontWeight:700,color:"#374151"}}>📅 생산연도</label>
          <select value={selYear} onChange={e=>{setSelYear(Number(e.target.value));setSel(null);}} style={yearSt}>
            {Array.from({length:5},(_,i)=>2026+i).map(y=><option key={y} value={y}>{y}년</option>)}
          </select>
        </div>
        {/* 작물별 모아보기 박스 */}
        <div style={{background:"white",borderRadius:16,border:"1px solid #e5e7eb",padding:16,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <p style={{fontWeight:900,color:"#111827",fontSize:14,margin:"0 0 12px"}}>🌾 작물별 파종 현황 모아보기</p>
          <div style={{display:"flex",gap:10}}>
            {Object.keys(SOW_CROP_GROUPS).map(g=>(
              <button key={g} onClick={()=>setSel(sel===g?null:g)}
                style={{flex:1,padding:"12px 0",borderRadius:12,border:"2px solid",borderColor:sel===g?"#16a34a":"#d1fae5",background:sel===g?"#16a34a":"white",color:sel===g?"white":"#16a34a",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>
                {cropIcon(g)} {g}
              </button>
            ))}
          </div>
        </div>

        {/* 선택된 작물 현황 */}
        {sel&&(()=>{
          const members=getMembers(sel);
          const totalArea=members.reduce((s,m)=>s+m.area,0);
          const sowedArea=members.reduce((s,m)=>s+(m.hasSaved?m.area*(m.rate/100):0),0);
          const overallPct=totalArea>0?Math.round(sowedArea/totalArea*100):0;

          // 품종별 집계
          const varietyMap={};
          members.forEach(m=>{
            const v=m.variety||'—';
            if(!varietyMap[v]) varietyMap[v]={total:0,sowed:0};
            varietyMap[v].total+=m.area;
            if(m.hasSaved) varietyMap[v].sowed+=m.area*(m.rate/100);
          });
          const varietyList=Object.entries(varietyMap).map(([v,d])=>({
            variety:v,
            total:d.total,
            sowed:d.sowed,
            pct:d.total>0?Math.round(d.sowed/d.total*100):0,
          }));

          // 작물별 집계 (맥류일 때만)
          const cropMap={};
          if(sel==='맥류'){
            members.forEach(m=>{
              const c=m.crop||'—';
              if(!cropMap[c]) cropMap[c]={total:0,sowed:0};
              cropMap[c].total+=m.area;
              if(m.hasSaved) cropMap[c].sowed+=m.area*(m.rate/100);
            });
          }
          const cropList=Object.entries(cropMap).map(([c,d])=>({
            crop:c,
            total:d.total,
            sowed:d.sowed,
            pct:d.total>0?Math.round(d.sowed/d.total*100):0,
          }));

          return(
            <div>
              {/* 게이지 카드 */}
              <div style={{background:"white",borderRadius:14,border:"1px solid #d1fae5",padding:16,marginBottom:16,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
                <p style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:4}}>📊 전체 파종(이앙)률 — 합산면적 대비 파종면적</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}}>
                  <div style={{fontSize:36,fontWeight:900,color:"#16a34a",lineHeight:1}}>
                    {overallPct}<span style={{fontSize:18,fontWeight:700}}>%</span>
                  </div>
                  <div style={{fontSize:13,color:"#6b7280",fontWeight:600,textAlign:"right"}}>
                    파종 면적 <strong style={{color:"#16a34a"}}>{sowedArea.toFixed(2)} ha</strong><br/>
                    전체 면적 <strong>{totalArea.toFixed(2)} ha</strong>
                  </div>
                </div>
                <div style={{height:16,background:"#e5e7eb",borderRadius:8,overflow:"hidden",marginBottom:4}}>
                  <div style={{height:"100%",width:`${overallPct}%`,background:"linear-gradient(90deg,#4ade80,#16a34a)",borderRadius:8,transition:"width .6s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                  {[0,25,50,75,100].map(v=><span key={v} style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>{v}%</span>)}
                </div>

                {/* 작물별 파종(이앙)률 — 맥류 전용 */}
                {cropList.length>0&&(
                  <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12,marginBottom:8}}>
                    <p style={{fontSize:12,fontWeight:900,color:"#374151",margin:"0 0 10px"}}>🌿 작물별 파종(이앙)률</p>
                    {cropList.map(({crop,total,sowed,pct})=>(
                      <div key={crop} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>

                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#6b7280"}}>{sowed.toFixed(2)} / {total.toFixed(2)} ha</span>
                            <span style={{fontSize:13,fontWeight:900,color:"#16a34a",minWidth:36,textAlign:"right"}}>{pct}%</span>

                        </div>

                    {varietyList.map(({variety,total,sowed,pct})=>(
                      <div key={variety} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>

                        <div style={{position:"relative",height:12,background:"#e5e7eb",borderRadius:6,overflow:"hidden"}}>

                          {pct>10&&<span style={{position:"absolute",top:0,left:0,width:`${pct}%`,height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"white"}}>{pct}%</span>}
                        </div>
                      </div>
                    ))}
                  </div>

                  :members.map((m,i)=>{
                    const sowedArea=m.hasSaved&&m.area>0?(m.area*(m.rate/100)).toFixed(2):'—';
                    const planStr=(m.planM1&&m.planD1&&m.planM2&&m.planD2)
                      ?`${m.planM1}.${m.planD1}~${m.planM2}.${m.planD2}`
                      :(m.planM1&&m.planD1)?`${m.planM1}.${m.planD1}~`:'—';
                    return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.1fr 0.7fr 1.2fr",textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#f9fafb",alignItems:"center"}}>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.danjiName}</div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.variety}</div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:sowedArea==='—'?"#9ca3af":"#111827"}}>

                      </div>
                      <div style={{padding:"10px 4px",color:planStr==='—'?"#9ca3af":"#374151",fontSize:11}}>{planStr}</div>
                    </div>
                    );
                  })
                }
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

          <p style={{fontWeight:900,color:"#111827",fontSize:14,margin:"0 0 12px"}}>🚨 작물별 모아보기</p>
          <div style={{display:"flex",gap:10}}>
            {Object.keys(CROP_GROUPS).map(g=>(
              <button key={g} onClick={()=>setSel(sel===g?null:g)}
                style={{flex:1,padding:"12px 0",borderRadius:12,border:"2px solid",borderColor:sel===g?"#dc2626":"#fca5a5",background:sel===g?"#dc2626":"white",color:sel===g?"white":"#dc2626",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>
                {cropIcon(g)} {g}
              </button>
            ))}
          </div>
        </div>

        {/* 선택된 작물 표 */}
        {sel&&(()=>{
          const rows=getRecords(sel);
          return(
            <div style={{background:"white",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>

                  <div key={h} style={{padding:"10px 4px",borderRight:i<arr.length-1?"1px solid #b91c1c":"none",lineHeight:1.3}}>{h}</div>

              </div>
              {rows.length===0

                :rows.map((r,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.2fr 1fr 0.8fr",textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#fef2f2",alignItems:"center"}}>

        })()}
      </div>

/* ════════════════════ ADMIN HARVEST SCREEN ════════════════════ */
function AdminHarvestScreen({app,onBack}){
  const[sel,setSel]=useState(null);
  const[selYear,setSelYear]=useState(Math.max(new Date().getFullYear(),2026));
  const yearSt={border:"2px solid #16a34a",borderRadius:10,padding:"7px 12px",fontWeight:900,fontSize:14,color:"#16a34a",background:"white",outline:"none",cursor:"pointer"};
  const cropIcon=g=>g==='벼'?'🌾':g==='콩'?'🫛':'🌿';

  const getMembers=(group)=>{
    const crops=CROP_GROUPS[group]||[];
    let shDb={};
    try{shDb=JSON.parse(localStorage.getItem('seedfarm_sh_v1')||'{}');}catch{}
    return app.users
      .filter(u=>u.role!=='admin'&&crops.includes(u.crop))
      .map(u=>{
        const raw=shDb.harvestData?.[u.id];
        // 선택 연도 데이터 사용
        let saved;
        if(!raw) saved=null;
        else if(Array.isArray(raw)) saved=raw;
        else saved=raw[selYear]||[];
        const d=(saved&&saved[0])?saved[0]:null;
        const totalArea=parseFloat(d?.area??u.area)||0;
        const rate=d?(parseFloat(d.rate)||0):null;
        const harvestedArea=(rate!==null&&totalArea>0)?(totalArea*rate/100):null;
        return{
          variety:      u.variety||'—',
          crop:         u.crop||'—',
          danjiName:    u.danjiName||'—',
          totalArea:    totalArea>0?totalArea:0,
          harvestedArea:harvestedArea!==null?harvestedArea:null,
          rate:         rate,
          hasSaved:     !!d,
          planM1:d?.planM1||'', planD1:d?.planD1||'',
          planM2:d?.planM2||'', planD2:d?.planD2||'',
        };
      });
  };

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:90}}>
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>🌾 수확현황</h1>
      </div>
      <div style={{padding:"16px"}}>
        {/* 생산연도 */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <label style={{fontSize:13,fontWeight:700,color:"#374151"}}>📅 생산연도</label>
          <select value={selYear} onChange={e=>{setSelYear(Number(e.target.value));setSel(null);}} style={yearSt}>
            {Array.from({length:5},(_,i)=>2026+i).map(y=><option key={y} value={y}>{y}년</option>)}
          </select>
        </div>
        {/* 작물별 모아보기 박스 */}
        <div style={{background:"white",borderRadius:16,border:"1px solid #e5e7eb",padding:16,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <p style={{fontWeight:900,color:"#111827",fontSize:14,margin:"0 0 12px"}}>🌾 작물별 모아보기</p>
          <div style={{display:"flex",gap:10}}>
            {Object.keys(CROP_GROUPS).map(g=>(
              <button key={g} onClick={()=>setSel(sel===g?null:g)}
                style={{flex:1,padding:"12px 0",borderRadius:12,border:"2px solid",borderColor:sel===g?"#16a34a":"#d1fae5",background:sel===g?"#16a34a":"white",color:sel===g?"white":"#16a34a",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>
                {cropIcon(g)} {g}
              </button>
            ))}
          </div>
        </div>

        {/* 선택된 작물 표 */}
        {sel&&(()=>{
          const members=getMembers(sel);
          const totalArea=members.reduce((s,m)=>s+m.totalArea,0);
          const harvestedArea=members.reduce((s,m)=>s+(m.harvestedArea||0),0);
          const overallPct=totalArea>0?Math.round(harvestedArea/totalArea*100):0;

          // 품종별 집계
          const varietyMap={};
          members.forEach(m=>{
            const v=m.variety||'—';
            if(!varietyMap[v]) varietyMap[v]={total:0,harvested:0};
            varietyMap[v].total+=m.totalArea;
            if(m.hasSaved) varietyMap[v].harvested+=(m.harvestedArea||0);
          });
          const varietyList=Object.entries(varietyMap).map(([v,d])=>({
            variety:v, total:d.total, harvested:d.harvested,
            pct:d.total>0?Math.round(d.harvested/d.total*100):0,
          }));

          // 작물별 집계 (맥류)
          const cropMap={};
          if(sel==='맥류'){
            members.forEach(m=>{
              const c=m.crop||'—';
              if(!cropMap[c]) cropMap[c]={total:0,harvested:0};
              cropMap[c].total+=m.totalArea;
              if(m.hasSaved) cropMap[c].harvested+=(m.harvestedArea||0);
            });
          }
          const cropList=Object.entries(cropMap).map(([c,d])=>({
            crop:c, total:d.total, harvested:d.harvested,
            pct:d.total>0?Math.round(d.harvested/d.total*100):0,
          }));

          const gaugeBar=(pct,color,textColor='white')=>(
            <div style={{position:"relative",height:12,background:"#e5e7eb",borderRadius:6,overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pct}%`,background:color,borderRadius:6,transition:"width .5s"}}/>
              {pct>10&&<span style={{position:"absolute",top:0,left:0,width:`${pct}%`,height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:textColor}}>{pct}%</span>}
            </div>
          );

          return(
            <div>
              {/* 게이지 카드 */}
              <div style={{background:"white",borderRadius:14,border:"1px solid #d1fae5",padding:16,marginBottom:16,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
                <p style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:4}}>📊 전체 수확률 — 합산면적 대비 수확면적</p>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}}>
                  <div style={{fontSize:36,fontWeight:900,color:"#e65100",lineHeight:1}}>
                    {overallPct}<span style={{fontSize:18,fontWeight:700}}>%</span>
                  </div>
                  <div style={{fontSize:13,color:"#6b7280",fontWeight:600,textAlign:"right"}}>
                    수확 면적 <strong style={{color:"#e65100"}}>{harvestedArea.toFixed(2)} ha</strong><br/>
                    전체 면적 <strong>{totalArea.toFixed(2)} ha</strong>
                  </div>
                </div>
                <div style={{position:"relative",height:16,background:"#e5e7eb",borderRadius:8,overflow:"hidden",marginBottom:4}}>
                  <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${overallPct}%`,background:"linear-gradient(90deg,#fb923c,#e65100)",borderRadius:8,transition:"width .6s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:cropList.length>0||varietyList.length>0?16:0}}>
                  {[0,25,50,75,100].map(v=><span key={v} style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>{v}%</span>)}
                </div>

                {/* 작물별 수확률 — 맥류 전용 */}
                {cropList.length>0&&(
                  <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12,marginBottom:12}}>
                    <p style={{fontSize:12,fontWeight:900,color:"#374151",margin:"0 0 10px"}}>🌿 작물별 수확률</p>
                    {cropList.map(({crop,total,harvested,pct})=>(
                      <div key={crop} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#111827"}}>{crop}</span>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#6b7280"}}>{harvested.toFixed(2)} / {total.toFixed(2)} ha</span>
                            <span style={{fontSize:13,fontWeight:900,color:"#e65100",minWidth:36,textAlign:"right"}}>{pct}%</span>
                          </div>
                        </div>
                        {gaugeBar(pct,"#fb923c","#7c2d12")}
                      </div>
                    ))}
                  </div>
                )}

                {/* 품종별 수확률 */}
                {varietyList.length>0&&(
                  <div style={{borderTop:"1px solid #e5e7eb",paddingTop:12}}>
                    <p style={{fontSize:12,fontWeight:900,color:"#374151",margin:"0 0 10px"}}>🌱 품종별 수확률</p>
                    {varietyList.map(({variety,total,harvested,pct})=>(
                      <div key={variety} style={{marginBottom:10}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#111827"}}>{variety}</span>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#6b7280"}}>{harvested.toFixed(2)} / {total.toFixed(2)} ha</span>
                            <span style={{fontSize:13,fontWeight:900,color:"#e65100",minWidth:36,textAlign:"right"}}>{pct}%</span>
                          </div>
                        </div>
                        {gaugeBar(pct,"#e65100")}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* 단지별 표 */}
              <div style={{background:"white",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.1fr 0.7fr 1.2fr",background:"#16a34a",color:"white",fontWeight:900,fontSize:11,textAlign:"center"}}>
                  {["품종명","단지명","수확면적/총면적(ha)","수확률","수확 예정일"].map((h,i,arr)=>(
                    <div key={h} style={{padding:"10px 4px",borderRight:i<arr.length-1?"1px solid #15803d":"none",lineHeight:1.3}}>{h}</div>
                  ))}
                </div>
                {members.length===0
                  ?<p style={{textAlign:"center",color:"#9ca3af",padding:32,fontSize:13}}>해당 작물 사용자가 없습니다.</p>
                  :members.map((m,i)=>{
                    const harvStr=m.harvestedArea!==null?m.harvestedArea.toFixed(2):'—';
                    const totalStr=m.totalArea>0?m.totalArea:'—';
                    const planStr=(m.planM1&&m.planD1&&m.planM2&&m.planD2)
                      ?`${m.planM1}.${m.planD1}~${m.planM2}.${m.planD2}`
                      :(m.planM1&&m.planD1)?`${m.planM1}.${m.planD1}~`:'—';
                    return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.1fr 0.7fr 1.2fr",textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#f9fafb",alignItems:"center"}}>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,color:"#111827"}}>{m.variety}</div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:"#374151"}}>{m.danjiName}</div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:harvStr==='—'?"#9ca3af":"#111827"}}>
                        {harvStr==='—'?'—':`${harvStr} / ${totalStr}`}
                      </div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:900,color:m.hasSaved?"#e65100":"#9ca3af"}}>
                        {m.hasSaved?`${m.rate}%`:"미입력"}
                      </div>
                      <div style={{padding:"10px 4px",color:planStr==='—'?"#9ca3af":"#374151",fontSize:11}}>{planStr}</div>
                    </div>
                    );
                  })
                }
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

                style={{flex:1,padding:"12px 0",borderRadius:12,border:"2px solid",borderColor:sel===g?"#16a34a":"#d1fae5",background:sel===g?"#16a34a":"white",color:sel===g?"white":"#16a34a",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>

            <div style={{background:"white",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.1fr 1.1fr 1.1fr",background:"#16a34a",color:"white",fontWeight:900,fontSize:11,textAlign:"center"}}>
                {["품종명","단지명","온탕소독일","침종일","육묘기간"].map((h,i,arr)=>(
                  <div key={h} style={{padding:"10px 4px",borderRight:i<arr.length-1?"1px solid #15803d":"none",lineHeight:1.3}}>{h}</div>
                ))}
              </div>
              {members.length===0
                ?<p style={{textAlign:"center",color:"#9ca3af",padding:32,fontSize:13}}>해당 작물 사용자가 없습니다.</p>
                :members.map((m,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1.1fr 1.1fr 1.1fr",textAlign:"center",fontSize:11,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#f9fafb",alignItems:"center"}}>
                    <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,color:"#111827"}}>{m.variety}</div>
                    <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",color:"#374151"}}>{m.danjiName}</div>
                    <div style={{padding:"8px 4px",borderRight:"1px solid #f3f4f6",color:m.hotDate==='—'?"#9ca3af":"#111827"}}>{m.hotDate}</div>
                    <div style={{padding:"8px 4px",borderRight:"1px solid #f3f4f6",color:m.soakDate==='—'?"#9ca3af":"#111827"}}>{m.soakDate}</div>
                    <div style={{padding:"8px 4px",color:m.bedPeriod==='—'?"#9ca3af":"#111827"}}>{m.bedPeriod}</div>
                  </div>
                ))

          );
        })()}
      </div>
    </div>
  );
}

/* ════════════════════ ADMIN SCREEN ════════════════════ */

    {key:"harvest",    icon:"🌾",color:"#fef3c7",label:"수확현황",                 desc:"작물별 수확 현황 확인",            active:true},

/* ════════════════════ ROOT ════════════════════ */
function App(){
  const[app,setApp]=useState(()=>ld()||INIT);
  const[screen,setScreen]=useState(()=>{
    const stayId=localStorage.getItem("stay_login");
    if(stayId){
      const saved=ld()||INIT;
      const u=saved.users?.find(u=>u.id===stayId);
      if(u) return "app";
    }
    return "login";
  });
  const[tab,setTab]=useState("home");
  const[noticeOpen,setNoticeOpen]=useState(false);
  const[disasterOpen,setDisasterOpen]=useState(false);
  const[canGoBack,setCanGoBack]=useState(false);

  // 로그인 상태 유지 시 currentUser 자동 설정
  useState(()=>{
    const stayId=localStorage.getItem("stay_login");
    if(stayId){
      const saved=ld()||INIT;
      const u=saved.users?.find(u=>u.id===stayId);
      if(u&&!saved.currentUser) setApp(p=>({...p,currentUser:u}));
    }
  });

  // ── 뒤로가기 처리 ──
  // 앱 내비게이션 스택: {screen, tab, noticeOpen, disasterOpen}
  const navStack=useRef([]);
  const noticeModalCloser=useRef(null);
  const recordSelRef=useRef(null); // RecordScreen의 현재 sel 상태를 App이 알 수 있도록

  const pushNav=useCallback((state)=>{
    navStack.current.push(state);
    history.pushState({idx:navStack.current.length},"","");
  },[]);

  // tab 변경 래퍼
  const goTab=(t)=>{
    pushNav({screen:"app",tab,noticeOpen,disasterOpen,recordSel:null});
    setTab(t);
    if(t!=="record") setDisasterOpen(false);
  };

  // popstate: 뒤로가기 발생 시 (안드로이드 포함)
  useEffect(()=>{
    history.replaceState({idx:0},"","");
    const onPop=(e)=>{
      // 0. 파종/수확 모달이 열려있으면 닫기만 하고 탭은 유지
      const shModal=document.getElementById('shModal');
      if(shModal&&shModal.style.display!=='none'){
        if(typeof closeShModal==='function') closeShModal();
        // navStack은 건드리지 않고 history entry만 복원
        if(navStack.current.length>0) history.pushState({idx:navStack.current.length},"","");
        else history.replaceState({idx:0},"","");
        return;
      }
      // 1. 공지 모달 닫기
      if(noticeModalCloser.current){
        noticeModalCloser.current();
        noticeModalCloser.current=null;
        history.pushState({idx:navStack.current.length},"","");
        return;
      }
      // 2. RecordScreen 내 서브화면이 열려있으면 먼저 닫기
      if(recordSelRef.current){
        recordSelRef.current(); // setSel(null) 호출
        history.pushState({idx:navStack.current.length||1},"","");
        return;
      }
      // 3. navStack에서 이전 상태 복원
      const prev=navStack.current.pop();
      if(prev){
        if(prev.screen==="login"||prev.screen==="signup") setScreen(prev.screen);
        else{
          setScreen("app");
          setTab(prev.tab||"home");
          setNoticeOpen(!!prev.noticeOpen);
          setDisasterOpen(!!prev.disasterOpen);
        }
        if(navStack.current.length>0) history.pushState({idx:navStack.current.length},"","");
        else history.replaceState({idx:0},"","");
      } else {
        history.pushState({idx:0},"","");
      }
    };
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[]);

  // screen 전환 시 스택에 이전 상태 push
  const changeScreen=(s)=>{
    pushNav({screen,tab,noticeOpen,disasterOpen});
    setScreen(s);
  };

  useEffect(()=>{if(app.currentUser)sv(app);},[app]);
  useEffect(()=>{const id=setInterval(()=>setCanGoBack(navStack.current.length>0),200);return()=>clearInterval(id);},[]);
  const onLogin=()=>{
    pushNav({screen:"login",tab:"home",noticeOpen:false,disasterOpen:false});
    setScreen("app");setTab("home");
  };
  const onLogout=()=>{
    localStorage.removeItem("stay_login");
    // users 정보는 유지하고 currentUser만 null로 저장
    setApp(p=>{
      const n={...p,currentUser:null};
      sv(n);
      return n;
    });
    navStack.current=[];
    history.replaceState({idx:0},"","");
    setScreen("login");setNoticeOpen(false);setDisasterOpen(false);
  };

  if(screen==="login") return<LoginScreen app={app} setApp={setApp} onLogin={onLogin} onSignup={()=>changeScreen("signup")}/>;
  if(screen==="signup")return<SignupScreen app={app} setApp={setApp} onBack={()=>changeScreen("login")}/>;
  const isAdmin=app.currentUser?.role==="admin";

  // 뒤로가기 버튼 핸들러
  const handleBackBtn=()=>{if(navStack.current.length===0)return;history.back();};
  const backBtn=(
    <button onClick={handleBackBtn}
      style={{position:"fixed",bottom:90,right:16,width:44,height:44,borderRadius:"50%",background:canGoBack?"#16a34a":"#d1d5db",color:"white",border:"none",fontSize:22,fontWeight:900,cursor:canGoBack?"pointer":"default",boxShadow:canGoBack?"0 4px 12px rgba(22,163,74,.4)":"none",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,lineHeight:1,transition:"background .2s"}}>←</button>
  );

  if(noticeOpen)return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"white",position:"relative"}}>
      <NoticeScreen app={app} setApp={setApp} noticeModalCloser={noticeModalCloser} onBack={()=>{pushNav({screen:"app",tab,noticeOpen:true,disasterOpen});setNoticeOpen(false);}}/>
      <NavBar active={tab} setActive={t=>{goTab(t);setNoticeOpen(false);}} isAdmin={isAdmin}/>
    </div>
  );
  const goDisaster=()=>{
    pushNav({screen:"app",tab,noticeOpen,disasterOpen:false});
    setTab("record");setDisasterOpen(true);
  };

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"white",position:"relative"}}>
      {tab==="home"     &&<HomeScreen     app={app} setApp={setApp} onNoticeMore={()=>{pushNav({screen:"app",tab,noticeOpen:false,disasterOpen});setNoticeOpen(true);}} onDisasterLink={goDisaster}/>}
      {tab==="record"   &&<RecordScreen   app={app} setApp={setApp} initDisaster={disasterOpen} key={disasterOpen?"d":"n"} recordSelRef={recordSelRef}/>}
      {tab==="my"       &&<MyScreen       app={app} setApp={setApp} onLogout={onLogout}/>}
      {tab==="admin"    &&isAdmin&&<AdminScreen app={app} setApp={setApp}/>}
      <NavBar active={tab} setActive={goTab} isAdmin={isAdmin}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

        </div>

          <button onclick="addHarvestVariety()" style="background:none;border:none;color:#16a34a;font-size:13px;font-weight:900;cursor:pointer;font-family:inherit;padding:4px 0;">+ 품종추가</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="shToast" class="sh-toast"></div>

<script>
// ════════ 파종/수확 공유 스토리지 ════════
const SH_KEY = 'seedfarm_sh_v1';
function shLoad() {
  try { return JSON.parse(localStorage.getItem(SH_KEY)||'{}'); } catch{return{};}
}
function shSave(data) {
  try { localStorage.setItem(SH_KEY, JSON.stringify(data)); } catch{}
}
function shToast(msg) {
  const t = document.getElementById('shToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}

// ════════ 모달 열기/닫기 ════════
let _shType = null;  // 'sowing' | 'harvest'
let _shUser = null;  // currentUser 객체

function openShModal(type, user) {
  _shType = type;
  _shUser = user;
  const modal = document.getElementById('shModal');
  modal.style.display = 'flex';

  const db = shLoad();
  const key = user?.id || 'unknown';

  if (type === 'sowing') {
    document.getElementById('shModalTitle').textContent = '🌱 파종현황';
    document.getElementById('sowingCards').style.display = 'block';
    document.getElementById('sowingBtns').style.display = 'block';
    document.getElementById('harvestCards').style.display = 'none';
    document.getElementById('harvestBtns').style.display = 'none';
    const curYear = Math.max(new Date().getFullYear(), 2026);
    const userSowing = db.sowingData?.[key];
    // 연도별 구조 지원 (객체) 및 이전 배열 구조 호환
    let saved = [];
    if (userSowing) {
      if (Array.isArray(userSowing)) {
        // 이전 구조: 배열 → 첫 카드 연도로 마이그레이션
        const yr = userSowing[0]?.prodYear || curYear;
        const db2 = db;
        if (!db2.sowingData) db2.sowingData = {};
        db2.sowingData[key] = { [yr]: userSowing };
        shSave(db2);
        saved = userSowing;
      } else {
        saved = userSowing[curYear] || [];
      }
    }
    renderSowingCards(saved.length ? saved : [{}], user);
  } else {
    document.getElementById('shModalTitle').textContent = '🌾 수확현황';
    document.getElementById('harvestCards').style.display = 'block';
    document.getElementById('harvestBtns').style.display = 'block';
    document.getElementById('sowingCards').style.display = 'none';
    document.getElementById('sowingBtns').style.display = 'none';
    const curYear = Math.max(new Date().getFullYear(), 2026);
    const userHarvest = db.harvestData?.[key];
    let havSaved;
    if (!userHarvest) {
      havSaved = [];
    } else if (Array.isArray(userHarvest)) {
      havSaved = userHarvest;
    } else {
      havSaved = userHarvest[curYear] || [];
    }
    renderHarvestCards(havSaved.length ? havSaved : [{}], user);
  }
}

function closeShModal() {
  document.getElementById('shModal').style.display = 'none';
  
  _shType = null;
  _shUser = null;
}

// ESC 키로 닫기
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeShModal(); });
// 안드로이드 뒤로가기로 shModal 닫기
window.addEventListener('popstate', e => {
  const modal = document.getElementById('shModal');
  if(modal && modal.style.display !== 'none') {
    modal.style.display = 'none';
    _shType = null; _shUser = null;
  }
});

// ════════ 파종 작물별 모아보기 ════════
const SOW_CROP_GROUPS = {"벼":["벼"],"콩":["콩"],"맥류":["보리","밀","트리티케일"]};

function showSowingOverview(group) {
  let allUsers = [];
  try { const d = JSON.parse(localStorage.getItem('seedfarm_v8')||'{}'); allUsers = d.users||[]; } catch{}

  const shDb = shLoad();
  const crops = SOW_CROP_GROUPS[group] || [];
  const members = allUsers
    .filter(u => u.role !== 'admin' && crops.includes(u.crop))
    .map(u => {
      const saved = shDb.sowingData?.[u.id];
      const d = (saved && saved[0]) ? saved[0] : null;
      return {
        danjiName: u.danjiName || '-',
        variety:   u.variety   || '-',
        area:      parseFloat(d?.area ?? u.area) || 0,
        farmCount: d?.farmCount || u.farmCount || '-',
        rate:      d ? (parseFloat(d.rate) || 0) : null,
        hasSaved:  !!d,
      };
    });

  const icon = group==='벼'?'🌾':group==='콩'?'🫛':'🌿';

  // 합산 통계
  const totalArea   = members.reduce((s,m)=>s+m.area, 0);
  const sowedArea   = members.reduce((s,m)=>s+(m.hasSaved ? m.area*(m.rate/100) : 0), 0);
  const overallPct  = totalArea > 0 ? Math.round(sowedArea/totalArea*100) : 0;

  // 행 HTML
  const thSt = 'padding:10px 6px;font-size:13px;font-weight:900;text-align:center;border-right:1px solid #15803d;white-space:nowrap;';
  const thLt = 'padding:10px 6px;font-size:13px;font-weight:900;text-align:center;white-space:nowrap;';
  const tdSt = 'padding:10px 6px;font-size:13px;text-align:center;border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;';
  const tdLt = 'padding:10px 6px;font-size:13px;text-align:center;border-bottom:1px solid #e5e7eb;';

  let rows = '';
  if (members.length === 0) {
    rows = `<tr><td colspan="5" style="padding:32px;text-align:center;color:#9ca3af;font-size:14px;">해당 작물 사용자가 없습니다.</td></tr>`;
  } else {
    members.forEach((m, i) => {
      const bg = i%2===0?'white':'#f9fafb';
      const rateCell = m.hasSaved
        ? `<div style="display:flex;align-items:center;gap:6px;justify-content:center;">
             <div style="flex:1;max-width:80px;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;">
               <div style="height:100%;width:${m.rate}%;background:#16a34a;border-radius:5px;"></div>
             </div>
             <span style="font-weight:900;color:#16a34a;min-width:36px;text-align:right;">${m.rate}%</span>
           </div>`
        : `<span style="color:#9ca3af;font-size:12px;">미입력</span>`;
      rows += `<tr style="background:${bg};">
        <td style="${tdSt}font-weight:700;">${m.danjiName}</td>
        <td style="${tdSt}">${m.variety}</td>
        <td style="${tdSt}">${m.area>0?m.area:'—'}</td>
        <td style="${tdSt}">${m.farmCount}</td>
        <td style="${tdLt}">${rateCell}</td>
      </tr>`;
    });
  }

  const html = `<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${icon} ${group} 파종 현황</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#f9fafb;color:#111827;}
  .header{background:#16a34a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
  .header h1{color:white;font-size:18px;font-weight:900;}
  .header button{background:white;color:#16a34a;border:none;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:900;cursor:pointer;}
  .wrap{padding:16px;max-width:640px;margin:0 auto;}

function formatPeriod(d1, d2) {
  const fmt = d => { const [,m,day] = d.split('-'); return `${parseInt(m)}.${parseInt(day)}`; };
  return d1 && d2 ? `📅 ${fmt(d1)} ~ ${fmt(d2)}` : '';
}

function updateSowTotalPeriod() {
  document.querySelectorAll('.sow-card').forEach(card=>{
    const rows = card.querySelectorAll('.sow-farm-row');
    const allDates = [];
    rows.forEach(row => {
      const d1 = row.querySelector('.sow-farm-date1')?.value;
      const d2 = row.querySelector('.sow-farm-date2')?.value;
      if(d1) allDates.push(new Date(d1));
      if(d2) allDates.push(new Date(d2));
    });
    if(allDates.length < 1) return;
    const min = new Date(Math.min(...allDates)), max = new Date(Math.max(...allDates));

    // 단지 파종(이앙) 실시일 자동 입력
    const pad2 = n => String(n).padStart(2,'0');
    const m1=min.getMonth()+1, d1=min.getDate();
    const actTxt1=card.querySelector('.sow-act-d1-text');
    const actHidM1=card.querySelector('.sow-act-m1');
    const actHidD1=card.querySelector('.sow-act-d1');
    if(actTxt1) actTxt1.value=`${pad2(m1)}.${pad2(d1)}`;
    if(actHidM1) actHidM1.value=m1;
    if(actHidD1) actHidD1.value=d1;
    const m2=max.getMonth()+1, d2=max.getDate();
    const actTxt2=card.querySelector('.sow-act-d2-text');
    const actHidM2=card.querySelector('.sow-act-m2');
    const actHidD2=card.querySelector('.sow-act-d2');
    if(actTxt2) actTxt2.value=`${pad2(m2)}.${pad2(d2)}`;
    if(actHidM2) actHidM2.value=m2;
    if(actHidD2) actHidD2.value=d2;
  });
}

/* 파종 카드 렌더 */
function renderSowingCards(data, user){
  const wrap=document.getElementById('sowingCards'); wrap.innerHTML='';
  const list=(data&&data.length)?data:[{}];
  list.forEach((d,idx)=>{
    const card=document.createElement('div');
    card.className='card sow-card';
    card.style.cssText=`padding:14px;margin-bottom:${idx<list.length-1?'14px':'10px'};${idx>0?'border-top:2px dashed #d1fae5;':''}`;
    card.innerHTML=_makeSowingCardHTML(d,user,idx);
    wrap.appendChild(card);
  });
  // +품종추가 버튼: dual/admin이고 MY 품종 수가 2개 이상일 때만 표시
  const addBtn=document.getElementById('sowAddVarietyBtn');
  if(addBtn){
    const canAdd=(user?.role==='dual'||user?.role==='admin');
    addBtn.style.display=canAdd?'block':'none';
    _updateSowAddBtn();
  }
}

/* +품종추가 버튼 활성/비활성 갱신 */
function _updateSowAddBtn(){
  const addBtn=document.getElementById('sowAddVarietyBtn');
  if(!addBtn||!_shUser) return;
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser.id}`)||'[]').length;}catch{}
  const maxCards=evLen; // extra_varieties 개수만큼 카드 허용 (품종1~N)
  const curCards=document.querySelectorAll('#sowingCards .sow-card').length;
  const btn=addBtn.querySelector('button');
  if(btn){
    btn.disabled=curCards>=maxCards;
    btn.style.color=curCards>=maxCards?'#9ca3af':'#16a34a';
    btn.style.cursor=curCards>=maxCards?'default':'pointer';
  }
}

/* 카드 제거 */
function removeSowingCard(btn){
  const card=btn.closest('.sow-card');
  if(card) card.remove();
  document.querySelectorAll('#sowingCards .sow-card').forEach((c,i)=>{
    const label=c.querySelector('span[style*="font-weight:900"]');
    if(label) label.firstChild && (label.firstChild.textContent=i>0?`품종 ${i+1}`:'');
  });
  _updateSowAddBtn();
}

  const firstYear=document.querySelector('#sowingCards .sow-card .sow-year')?.value||Math.max(new Date().getFullYear(),2026);
  // MY extra_varieties에서 해당 인덱스 품종 기본값 가져오기
  let evData={};
  try{
    const ev=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]');
    if(ev[idx]) evData={prodYear:firstYear,unit:_shUser?.danjiName||'',variety:ev[idx].variety||'',area:ev[idx].area||'',farmCount:ev[idx].farmCount||''};
    else evData={prodYear:firstYear};
  }catch{ evData={prodYear:firstYear}; }
  // 최대 카드 수 체크
  let evLen=0;

  card.className='card sow-card';

/* 수확 카드 렌더 */
function renderHarvestCards(data, user){
  const wrap=document.getElementById('harvestCards'); wrap.innerHTML='';
  const list=(data&&data.length)?data:[{}];
  list.forEach((d,idx)=>{
    const card=document.createElement('div');
    card.className='card hav-card';
    card.style.cssText=`padding:14px;margin-bottom:${idx<list.length-1?'14px':'10px'};${idx>0?'border-top:2px dashed #d1fae5;':''}`;
    card.innerHTML=_makeHarvestCardHTML(d,user,idx);
    wrap.appendChild(card);
  });
  // +품종추가 버튼: dual/admin만 표시
  const addBtn=document.getElementById('havAddVarietyBtn');
  if(addBtn){
    const canAdd=(user?.role==='dual'||user?.role==='admin');
    addBtn.style.display=canAdd?'block':'none';
    _updateHavAddBtn();
  }
}

/* +품종추가 버튼 활성/비활성 갱신 */
function _updateHavAddBtn(){
  const addBtn=document.getElementById('havAddVarietyBtn');
  if(!addBtn||!_shUser) return;
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser.id}`)||'[]').length;}catch{}
  const curCards=document.querySelectorAll('#harvestCards .hav-card').length;
  const btn=addBtn.querySelector('button');
  if(btn){
    btn.disabled=curCards>=evLen;
    btn.style.color=curCards>=evLen?'#9ca3af':'#16a34a';
    btn.style.cursor=curCards>=evLen?'default':'pointer';
  }
}

/* 수확 카드 제거 */
function removeHarvestCard(btn){
  const card=btn.closest('.hav-card');
  if(card) card.remove();
  document.querySelectorAll('#harvestCards .hav-card').forEach((c,i)=>{
    const label=c.querySelector('span[style*="font-weight:900"]');
    if(label) label.textContent=i>0?`품종 ${i+1}`:'';
  });
  _updateHavAddBtn();
}

/* +품종추가 클릭 */
function addHarvestVariety(){
  const wrap=document.getElementById('harvestCards');
  const idx=wrap.querySelectorAll('.hav-card').length;
  // 최대 카드 수 체크
  let evLen=0;
  try{evLen=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]').length;}catch{}
  if(idx>=evLen) return;
  const firstYear=document.querySelector('#harvestCards .hav-card .hav-year')?.value||Math.max(new Date().getFullYear(),2026);
  let evData={prodYear:firstYear};
  try{
    const ev=JSON.parse(localStorage.getItem(`extra_varieties_${_shUser?.id}`)||'[]');
    if(ev[idx]) evData={prodYear:firstYear,unit:_shUser?.danjiName||'',variety:ev[idx].variety||'',area:ev[idx].area||'',farmCount:ev[idx].farmCount||''};
  }catch{}
  const card=document.createElement('div');
  card.className='card hav-card';
  card.style.cssText='padding:14px;margin-bottom:10px;border-top:2px dashed #d1fae5;';
  card.innerHTML=_makeHarvestCardHTML(evData,_shUser,idx);
  wrap.appendChild(card);
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  _updateHavAddBtn();
}

/* 데이터 수집 */
function getSowingCards(){
  const cards=document.querySelectorAll('#sowingCards .sow-card');
  if(!cards.length) return [];
  return Array.from(cards).map(card=>{
    const g=card.querySelector('[data-rate]');
    const farms=Array.from(card.querySelectorAll('.sow-farm-row')).map(r=>({name:r.querySelector('.sow-farm-name')?.value.trim()||'',date1:r.querySelector('.sow-farm-date1')?.value||'',date2:r.querySelector('.sow-farm-date2')?.value||''}));
    return{
      prodYear: card.querySelector('.sow-year')?.value||'',
      unit:     card.querySelector('.sow-unit')?.value.trim()||'',
      variety:  card.querySelector('.sow-variety')?.value.trim()||'',
      area:     card.querySelector('.sow-area')?.value||'',
      farmCount:card.querySelector('.sow-farm-count')?.value||'',
      planM1:   card.querySelector('.sow-plan-m1')?.value||'',
      planD1:   card.querySelector('.sow-plan-d1')?.value||'',
      planM2:   card.querySelector('.sow-plan-m2')?.value||'',
      planD2:   card.querySelector('.sow-plan-d2')?.value||'',
      actM1:    card.querySelector('.sow-act-m1')?.value||'',
      actD1:    card.querySelector('.sow-act-d1')?.value||'',
      actM2:    card.querySelector('.sow-act-m2')?.value||'',
      actD2:    card.querySelector('.sow-act-d2')?.value||'',
      farms,
      rate:     g?g.dataset.rate:'0',
      note:     card.querySelector('.sow-note')?.value.trim()||''
    };
  });
}
function getHarvestCards(){
  const cards=document.querySelectorAll('#harvestCards .hav-card');
  if(!cards.length) return [];
  return Array.from(cards).map(card=>{
    const g=card.querySelector('[data-rate]');
    const farms=Array.from(card.querySelectorAll('.hav-farm-row')).map(r=>({name:r.querySelector('.hav-farm-name')?.value.trim()||'',date1:r.querySelector('.hav-farm-date1')?.value||'',date2:r.querySelector('.hav-farm-date2')?.value||''}));
    return{prodYear:card.querySelector('.hav-year')?.value||'',unit:card.querySelector('.hav-unit')?.value.trim()||'',variety:card.querySelector('.hav-variety')?.value.trim()||'',area:card.querySelector('.hav-area')?.value||'',farmCount:card.querySelector('.hav-farm-count')?.value||'',planM1:card.querySelector('.hav-plan-m1')?.value||'',planD1:card.querySelector('.hav-plan-d1')?.value||'',planM2:card.querySelector('.hav-plan-m2')?.value||'',planD2:card.querySelector('.hav-plan-d2')?.value||'',actM1:card.querySelector('.hav-act-m1')?.value||'',actD1:card.querySelector('.hav-act-d1')?.value||'',actM2:card.querySelector('.hav-act-m2')?.value||'',actD2:card.querySelector('.hav-act-d2')?.value||'',farms,rate:g?g.dataset.rate:'0',note:card.querySelector('.hav-note')?.value.trim()||''};
  });
}
