<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>채종단지 생산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<style>
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body,#root{height:100%;margin:0;padding:0;background:#f3f4f6;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#9ca3af;border-radius:2px;}
@media print{.no-print{display:none!important;}body{background:white;}}
/* ── 파종/수확 모달 스타일 ── */
:root{--rice:#2d6a4f;--rice-lt:#b7e4c7;--rice-bg:#f0faf4;--grain:#7b5e2a;--grain-lt:#f0d9a8;--grain-bg:#fdf8ee;--bean:#5c4a8a;--bean-lt:#d8cff0;--bean-bg:#f5f2fc;--navy:#1a2540;--gold:#c8960c;--cream:#faf8f3;--border:#ddd;--text:#1a1a1a;--muted:#666;--shadow:0 2px 16px rgba(0,0,0,0.08);--radius:12px;}
.sh-modal-overlay{position:fixed;inset:0;background:#f9fafb;z-index:9000;display:flex;flex-direction:column;overflow:hidden;}
.sh-modal-inner{background:#f9fafb;flex:1;overflow-y:auto;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto;scrollbar-width:none;-ms-overflow-style:none;}
.sh-modal-inner::-webkit-scrollbar{display:none;}
.sh-modal-header{background:#16a34a;padding:16px;display:flex;align-items:center;flex-shrink:0;}
.sh-modal-header h2{color:white;font-size:18px;font-weight:900;margin:0;}
.sh-modal-header button.sh-back{background:none;border:none;color:white;font-size:22px;cursor:pointer;line-height:1;padding:0;margin-right:8px;}
.sh-content{padding:12px 12px 80px;}
.sh-card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);}
.sh-card-hd{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;color:#111;}
.sh-fg{margin-bottom:10px;}
.sh-fg label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.sh-fg input,.sh-fg select,.sh-fg textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;color:var(--text);background:#fafafa;outline:none;transition:border-color 0.2s;box-sizing:border-box;}
.sh-fg input:focus,.sh-fg select:focus{border-color:var(--rice);background:white;}
.sh-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sh-btn{width:100%;padding:12px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;}
.sh-btn-primary{background:linear-gradient(135deg,var(--rice),#1a3a2a);color:white;}
.sh-btn-ghost{background:white;color:var(--rice);border:1.5px solid var(--rice);}
.sh-btn:active{transform:scale(0.98);}
.sh-period-display{font-size:12px;color:var(--rice);font-weight:600;margin-top:3px;}
.sh-gauge-wrap{margin-bottom:14px;}
.sh-gauge-banner{display:flex;justify-content:space-between;align-items:center;border-radius:12px;padding:12px 16px;margin-bottom:10px;color:white;}
.sh-gauge-track-wrap{padding:0 4px;}
.sh-gauge-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.sh-gauge-labels span{font-size:10px;font-weight:700;color:#888;}
.sh-gauge-track{position:relative;height:32px;cursor:pointer;user-select:none;}
.sh-gauge-bg{position:absolute;top:50%;left:0;right:0;height:12px;transform:translateY(-50%);background:#e0e0e0;border-radius:6px;overflow:hidden;}
.sh-gauge-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .08s ease;}
.sh-gauge-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:white;border:3px solid;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;cursor:grab;transition:left .08s ease;touch-action:none;}
.sh-farm-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f3f4f6;}
.sh-farm-row:last-child{border-bottom:none;}
.sh-farm-row input{flex:1;min-width:0;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:#fafafa;outline:none;box-sizing:border-box;}
.sh-farm-row input:focus{border-color:var(--rice);}
.sh-farm-row button{background:#fee2e2;border:none;border-radius:6px;padding:6px 8px;color:#c0392b;font-size:13px;cursor:pointer;flex-shrink:0;}
.sh-add-row{width:100%;background:none;border:1.5px dashed var(--border);color:var(--muted);border-radius:6px;padding:6px;font-size:12px;cursor:pointer;margin-top:4px;font-family:inherit;}
.sh-add-row:hover{border-color:var(--rice);color:var(--rice);}
.sh-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.sh-photo-item{aspect-ratio:1;border-radius:8px;overflow:hidden;background:#f3f4f6;position:relative;}
.sh-photo-item img{width:100%;height:100%;object-fit:cover;}
.sh-photo-item button{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.5);border:none;color:white;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:white;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;white-space:nowrap;z-index:9999;opacity:0;transition:all .28s;pointer-events:none;}
.sh-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ── 소독·육묘 관리 스타일 ── */
.ds-input{border:2px solid #9ca3af;border-radius:10px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;background:#fff;box-sizing:border-box;}
.ds-input:focus{border-color:#16a34a;}
.ds-field-row{margin-bottom:14px;}
.ds-field-row>label{font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:6px;}
.ds-field-row-inline{display:flex;align-items:center;gap:10px;margin-bottom:14px;min-height:38px;}
.ds-field-label-inline{font-size:13px;font-weight:700;color:#166534;flex:0 0 auto;width:110px;line-height:1.4;}
.ds-field-content-inline{flex:1;min-width:0;}
/* 소독육묘 통일 레이아웃 */
.ds-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;min-height:36px;}
.ds-label{font-size:13px;font-weight:700;color:#166534;flex:0 0 110px;line-height:1.4;padding-top:8px;}
.ds-content{flex:1;min-width:0;}
.ds-check-group{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;}
.ds-check-label{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-size:14px;}
.ds-check-box{width:22px;height:22px;border-radius:5px;border:2px solid #9ca3af;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;transition:.15s;}
.ds-check-box.on{background:#16a34a;border-color:#16a34a;color:#fff;font-size:13px;font-weight:700;}
.ds-mini-cal{position:fixed;z-index:9100;background:#fff;border:1.5px solid #9ca3af;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);padding:14px;width:260px;}
.ds-mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:6px;}
.ds-cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:pointer;border:none;background:none;font-family:inherit;}
.ds-cal-day:hover{background:#dcfce7;color:#15803d;}
.ds-card{background:#fff;border-radius:16px;border:1px solid #d1fae5;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

/* ── storage ── */
const SK="seedfarm_v8";
const ld=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const sv=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};

/* ── default state ── */
const INIT={
  users:[{id:"admin",pw:"12345",role:"admin",region:"",danjiName:"본부",chairName:"관리자",crop:"-",variety:"-",farmCount:0,area:0,production:0,signature:null}],
  currentUser:null,records:{},
  notices:[
    {id:1,urgent:true, title:"2025년 채종포 이앙 일정 긴급 공지",date:"2025-06-01",summary:"금년도 이앙 일정이 확정되었습니다. 반드시 확인 후 참여 바랍니다."},
    {id:2,urgent:false,title:"종자소독 교육 안내",               date:"2025-05-20",summary:"6월 5일 종자소독 교육이 진행될 예정입니다."},
    {id:3,urgent:false,title:"채종단지 생산관리 앱 사용 안내",    date:"2025-05-10",summary:"본 앱의 주요 기능 및 사용 방법을 안내합니다."},
  ],
  schedules:[
    {id:1,date:"2025-06-10",title:"이앙(모내기) 시작",location:"전북 완주군"},
    {id:2,date:"2025-06-12",title:"원종 배부",         location:"전북 정읍시"},
    {id:3,date:"2025-06-15",title:"포장관리 점검",     location:"전북 고창군"},
  ],
};
const ACTS=["단지 회원 교육 및 유의사항 안내","원종 배부","포장관리(이형주, 잡초 제거 등)","관개수 관리 지도","병해충 방제 지도","비료 관리 지도","콤바인/건조기점검 또는 수확/탈곡 지도","공동 수확/건조 작업","수매 준비 작업","기상재해 피해 점검","포장검사 실시","생육상태 점검","기타"];

/* ── icons ── */
const IcoHome=()=><svg viewBox="0 0 24 24" fill="currentColor" style={{width:24,height:24}}><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>;
const IcoCal =()=><svg viewBox="0 0 24 24" fill="currentColor" style={{width:24,height:24}}><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>;
const IcoRec =()=><svg viewBox="0 0 24 24" fill="currentColor" style={{width:24,height:24}}><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8zm0-4h8v2H8z"/></svg>;
const IcoUser=()=><svg viewBox="0 0 24 24" fill="currentColor" style={{width:24,height:24}}><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>;
const IcoAdmin=()=><svg viewBox="0 0 24 24" fill="currentColor" style={{width:24,height:24}}><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>;

/* ── shared styles ── */
const card={background:"white",borderRadius:20,boxShadow:"0 1px 4px rgba(0,0,0,.07)",border:"1px solid #f3f4f6"};
const bigBtn=(bg,col,ex={})=>({width:"100%",background:bg,color:col,border:"none",borderRadius:12,padding:16,fontSize:17,fontWeight:900,cursor:"pointer",...ex});

/* ════════════════════ SIGNATURE MODAL ════════════════════ */
function SignatureModal({onSave,onClose}){
  const cvRef=useRef();const drawing=useRef(false);const last=useRef(null);
  const gp=(e,cv)=>{const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(cv.width/r.width),y:(s.clientY-r.top)*(cv.height/r.height)};};
  const start=e=>{e.preventDefault();drawing.current=true;last.current=gp(e,cvRef.current);};
  const move=e=>{
    e.preventDefault();if(!drawing.current)return;
    const cv=cvRef.current,ctx=cv.getContext("2d"),p=gp(e,cv);
    ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="#111";ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();last.current=p;
  };
  const end=()=>{drawing.current=false;last.current=null;};
  const clear=()=>cvRef.current.getContext("2d").clearRect(0,0,cvRef.current.width,cvRef.current.height);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:"0 16px"}}>
      <div style={{background:"white",borderRadius:20,padding:20,width:"100%",maxWidth:360,boxShadow:"0 20px 40px rgba(0,0,0,.25)"}}>
        <h3 style={{fontWeight:900,fontSize:18,textAlign:"center",margin:"0 0 4px"}}>✍️ 서명 입력</h3>
        <p style={{fontSize:12,color:"#9ca3af",textAlign:"center",margin:"0 0 12px"}}>아래 칸에 손가락으로 서명하세요</p>
        <canvas ref={cvRef} width={320} height={160}
          style={{width:"100%",border:"2px solid #d1d5db",borderRadius:12,background:"#f9fafb",display:"block",touchAction:"none"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        <div style={{display:"flex",gap:12,marginTop:16}}>
          <button onClick={clear}   style={{flex:1,background:"#f3f4f6",color:"#374151",border:"none",borderRadius:12,padding:12,fontWeight:700,cursor:"pointer"}}>지우기</button>
          <button onClick={onClose} style={{flex:1,background:"#f3f4f6",color:"#374151",border:"none",borderRadius:12,padding:12,fontWeight:700,cursor:"pointer"}}>취소</button>
          <button onClick={()=>onSave(cvRef.current.toDataURL("image/png"))} style={{flex:1,background:"#16a34a",color:"white",border:"none",borderRadius:12,padding:12,fontWeight:900,cursor:"pointer"}}>저장</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ LOGIN ════════════════════ */
function LoginScreen({app,setApp,onLogin,onSignup}){
  const[id,setId]=useState(()=>localStorage.getItem("saved_id")||"");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState("");
  const[remId,setRemId]=useState(()=>!!localStorage.getItem("saved_id"));
  const[stayLogin,setStayLogin]=useState(()=>!!localStorage.getItem("stay_login"));

  const doLogin=()=>{
    // 최신 저장 데이터에서 사용자 찾기 (로그아웃 후 재로그인 시 최신 정보 보장)
    const freshApp=ld()||{users:app.users};
    const u=(freshApp.users||app.users).find(u=>u.id===id&&u.pw===pw);
    if(u){
      // 아이디 기억
      if(remId) localStorage.setItem("saved_id",id);
      else localStorage.removeItem("saved_id");
      // 로그인 상태 유지
      if(stayLogin) localStorage.setItem("stay_login",id);
      else localStorage.removeItem("stay_login");
      setApp(p=>({...p,...freshApp,currentUser:u}));
      onLogin();
    } else setErr("아이디 또는 비밀번호가 올바르지 않습니다.");
  };

  const chkSt={display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151"};
  const chkBox=(checked)=>({width:18,height:18,borderRadius:5,border:`2px solid ${checked?"#16a34a":"#d1d5db"}`,background:checked?"#16a34a":"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"});

  return(
    <div style={{minHeight:"100vh",background:"white",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
      <div style={{width:"100%",maxWidth:360}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:80,height:80,background:"#16a34a",borderRadius:16,marginBottom:16,boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}><span style={{fontSize:36}}>🌾</span></div>
          <h1 style={{fontSize:24,fontWeight:900,color:"#14532d",lineHeight:1.3,margin:0}}>채종단지<br/>생산관리</h1>
          <p style={{fontSize:12,color:"#9ca3af",marginTop:6}}>국립종자원 전북지원</p>
        </div>
        <label style={{display:"block",fontSize:14,fontWeight:700,color:"#374151",marginBottom:6}}>아이디</label>
        <input value={id} onChange={e=>setId(e.target.value)} placeholder="아이디 입력"
          style={{width:"100%",border:"2px solid #d1d5db",borderRadius:12,padding:"14px 16px",fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:16}}
          onFocus={e=>e.target.style.borderColor="#16a34a"} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>
        <label style={{display:"block",fontSize:14,fontWeight:700,color:"#374151",marginBottom:6}}>비밀번호</label>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="비밀번호 입력"
          style={{width:"100%",border:"2px solid #d1d5db",borderRadius:12,padding:"14px 16px",fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:12}}
          onFocus={e=>e.target.style.borderColor="#16a34a"} onBlur={e=>e.target.style.borderColor="#d1d5db"}
          onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
        {/* 체크박스 */}
        <div style={{display:"flex",gap:20,marginBottom:16}}>
          <label style={chkSt} onClick={()=>setRemId(v=>!v)}>
            <div style={chkBox(remId)}>{remId&&<span style={{color:"white",fontSize:11,fontWeight:900}}>✓</span>}</div>
            아이디 기억
          </label>
          <label style={chkSt} onClick={()=>setStayLogin(v=>!v)}>
            <div style={chkBox(stayLogin)}>{stayLogin&&<span style={{color:"white",fontSize:11,fontWeight:900}}>✓</span>}</div>
            로그인 상태 유지
          </label>
        </div>
        {err&&<p style={{color:"#ef4444",fontSize:13,textAlign:"center",marginBottom:12}}>{err}</p>}
        <button onClick={doLogin} style={{...bigBtn("#16a34a","white"),marginBottom:12,boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>로그인</button>
        <button onClick={onSignup} style={bigBtn("white","#16a34a",{border:"2px solid #16a34a"})}>회원가입</button>
      </div>
    </div>
  );
}

/* ════════════════════ SIGNUP ════════════════════ */
/* ── 회원가입 전용 헬퍼 — 컴포넌트 외부에 정의해야 리렌더 시 재마운트되지 않음 ── */
const inputStyle={width:"100%",border:"2px solid #d1d5db",borderRadius:12,padding:"12px 14px",fontSize:15,outline:"none",boxSizing:"border-box"};
function SLI({label,children}){return<div style={{marginBottom:16}}><label style={{display:"block",fontSize:14,fontWeight:700,color:"#374151",marginBottom:6}}>{label}</label>{children}</div>;}
function SINP({value,onChange,placeholder,type="text"}){
  return<input type={type} value={value} onChange={onChange} placeholder={placeholder||""} style={inputStyle}
    onFocus={e=>e.target.style.borderColor="#16a34a"} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>;
}

function SignupScreen({app,setApp,onBack}){
  const emptyExtra=()=>({crop:"",variety:""});
  const[f,setF]=useState({id:"",pw:"",region:"",danjiName:"",chairName:"",crop:"",variety:"",signature:null});
  const[cropCount,setCropCount]=useState(1);
  const[extras,setExtras]=useState([emptyExtra(),emptyExtra()]);
  const[idOk,setIdOk]=useState(false);const[idMsg,setIdMsg]=useState("");
  const[pwErr,setPwErr]=useState("");const[err,setErr]=useState("");const[done,setDone]=useState(false);
  const[sigModal,setSigModal]=useState(false);
  const upd=(k,v)=>{setF(p=>({...p,[k]:v}));if(k==="id"){setIdOk(false);setIdMsg("");}if(k==="pw")setPwErr(/^(?=.*[a-zA-Z])(?=.*\d).{10,}$/.test(v)?"":"10자 이상의 영문과 숫자 조합이어야 합니다.");};
  const updExtra=(i,k,v)=>setExtras(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const checkId=()=>{if(!f.id)return setIdMsg("아이디를 입력하세요.");if(app.users.some(u=>u.id===f.id)){setIdMsg("이미 사용중인 아이디입니다.");setIdOk(false);}else{setIdMsg("사용 가능한 아이디입니다.");setIdOk(true);}};
  const submit=()=>{
    if(!idOk)return setErr("중복 ID 확인을 해주세요.");
    if(!/^(?=.*[a-zA-Z])(?=.*\d).{10,}$/.test(f.pw))return setErr("비밀번호 형식을 확인해주세요.");
    if(!f.region)return setErr("지역명을 입력해주세요.");
    if(!f.danjiName)return setErr("단지명을 입력해주세요.");
    if(!f.chairName)return setErr("단지회장명을 입력해주세요.");
    if(!f.crop)return setErr("작물명을 입력해주세요.");
    if(!f.variety)return setErr("품종명을 입력해주세요.");
    if(!f.signature)return setErr("본인 서명을 입력해주세요.");
    for(let i=0;i<cropCount-1;i++){
      if(!extras[i].crop)return setErr(`연관계정 ${i+2}의 작물명을 입력해주세요.`);
      if(!extras[i].variety)return setErr(`연관계정 ${i+2}의 품종명을 입력해주세요.`);
    }
    const base={pw:f.pw,role:"user",region:f.region,danjiName:f.danjiName,chairName:f.chairName,farmCount:0,area:0,production:0,signature:f.signature,cropCount};
    const nu={...base,id:f.id,crop:f.crop,variety:f.variety,linkedId:null};
    const linked=Array.from({length:cropCount-1},(_,i)=>({...base,id:`${f.id}_0${i+2}`,crop:extras[i].crop,variety:extras[i].variety,linkedId:f.id}));
    setApp(p=>{const n={...p,users:[...p.users,nu,...linked]};sv(n);return n;});setDone(true);
  };
  if(done)return(
    <div style={{minHeight:"100vh",background:"white",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:64,marginBottom:20}}>✅</div>
        <h2 style={{fontSize:22,fontWeight:900,color:"#16a34a",margin:"0 0 10px"}}>회원가입이 완료 되었습니다</h2>
        <p style={{color:"#9ca3af",fontSize:13,marginBottom:32}}>로그인 후 서비스를 이용하실 수 있습니다.</p>
        <button onClick={onBack} style={{...bigBtn("#16a34a","white"),maxWidth:280,boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>로그인</button>
      </div>
    </div>
  );
  const inp=(k,ph,type="text")=><SINP value={f[k]} onChange={e=>upd(k,e.target.value)} placeholder={ph} type={type}/>;
  const extraInp=(i,k,ph)=><SINP value={extras[i][k]} onChange={e=>updExtra(i,k,e.target.value)} placeholder={ph}/>;
  const boxStyle=(color)=>({background:color==="green"?"#f0fdf4":color==="blue"?"#eff6ff":"#faf5ff",borderRadius:16,padding:16,marginBottom:16,border:`1px solid ${color==="green"?"#bbf7d0":color==="blue"?"#bfdbfe":"#e9d5ff"}`});
  const tagStyle=(color)=>({fontSize:12,fontWeight:900,color:color==="green"?"#16a34a":color==="blue"?"#2563eb":"#7c3aed",marginBottom:12,display:"block"});
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      {sigModal&&<SignatureModal onSave={d=>{upd("signature",d);setSigModal(false);}} onClose={()=>setSigModal(false)}/>}
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:12,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontSize:20,fontWeight:900,margin:0}}>회원가입</h1>
      </div>
      <div style={{padding:"20px 20px 80px"}}>
        <SLI label="아이디">
          <div style={{display:"flex",gap:8}}>
            <input value={f.id} onChange={e=>upd("id",e.target.value)} placeholder="아이디"
              style={{flex:1,border:"2px solid #d1d5db",borderRadius:12,padding:"12px 14px",fontSize:15,outline:"none"}}
              onFocus={e=>e.target.style.borderColor="#16a34a"} onBlur={e=>e.target.style.borderColor="#d1d5db"}/>
            <button onClick={checkId} style={{background:"#16a34a",color:"white",border:"none",borderRadius:12,padding:"12px 14px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>중복ID 확인</button>
          </div>
          {idMsg&&<p style={{fontSize:13,color:idOk?"#16a34a":"#ef4444",marginTop:4}}>{idMsg}</p>}
        </SLI>
        <SLI label="비밀번호">{inp("pw","비밀번호","password")}
          <p style={{fontSize:11,color:"#9ca3af",marginTop:4}}>10자 이상의 영문과 숫자 조합</p>
          {pwErr&&<p style={{fontSize:12,color:"#ef4444",marginTop:2}}>{pwErr}</p>}
        </SLI>
        {[["danjiName","단지명"],["region","지역명"],["chairName","단지회장명"]].map(([k,l])=><SLI key={k} label={l}>{inp(k,l)}</SLI>)}
        {/* 작물 수 */}
        <SLI label="작물 수">
          <select value={cropCount} onChange={e=>setCropCount(Number(e.target.value))}
            style={{width:"100%",border:"2px solid #d1d5db",borderRadius:12,padding:"12px 14px",fontSize:15,outline:"none",background:"white",boxSizing:"border-box"}}>
            {[1,2,3].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </SLI>
        {/* 작물 1 */}
        <div style={boxStyle("green")}>
          <span style={tagStyle("green")}>🌾 작물 1 (기본계정: {f.id||"아이디"})</span>
          <SLI label="작물명">{inp("crop","작물명")}</SLI>
          <SLI label="품종명">{inp("variety","품종명")}</SLI>
        </div>
        {/* 작물 2 */}
        {cropCount>=2&&(
          <div style={boxStyle("blue")}>
            <span style={tagStyle("blue")}>🌾 작물 2 (연관계정: {f.id||"아이디"}_02)</span>
            <SLI label="작물명">{extraInp(0,"crop","작물명")}</SLI>
            <SLI label="품종명">{extraInp(0,"variety","품종명")}</SLI>
          </div>
        )}
        {/* 작물 3 */}
        {cropCount>=3&&(
          <div style={boxStyle("purple")}>
            <span style={tagStyle("purple")}>🌾 작물 3 (연관계정: {f.id||"아이디"}_03)</span>
            <SLI label="작물명">{extraInp(1,"crop","작물명")}</SLI>
            <SLI label="품종명">{extraInp(1,"variety","품종명")}</SLI>
          </div>
        )}
        <SLI label="본인 서명">
          <div onClick={()=>setSigModal(true)}
            style={{border:"2px dashed #d1d5db",borderRadius:12,padding:16,display:"flex",alignItems:"center",justifyContent:"center",minHeight:80,cursor:"pointer",background:"white"}}>
            {f.signature
              ?<img src={f.signature} alt="서명" style={{maxHeight:64}}/>
              :<div style={{textAlign:"center"}}><p style={{color:"#16a34a",fontWeight:700,fontSize:14,margin:0}}>✍️ 터치하여 서명하세요</p><p style={{fontSize:12,color:"#9ca3af",marginTop:4}}>손가락으로 직접 서명 입력</p></div>}
          </div>
          {f.signature&&<button onClick={()=>upd("signature",null)} style={{background:"none",border:"none",color:"#ef4444",fontSize:12,cursor:"pointer",marginTop:4}}>서명 지우기</button>}
        </SLI>
        {err&&<p style={{color:"#ef4444",fontSize:13,textAlign:"center",marginBottom:8}}>{err}</p>}
        <button onClick={submit} style={{...bigBtn("#16a34a","white"),boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>회원가입</button>
      </div>
    </div>
  );
}

/* ════════════════════ NOTICE MODAL ════════════════════ */
function NoticeModal({notice,isAdmin,onSave,onDelete,onClose}){
  const isNew=!notice;
  const[title,setTitle]=useState(notice?.title||"");
  const[body,setBody]=useState(notice?.summary||"");
  const[urgent,setUrgent]=useState(notice?.urgent||false);
  const initTargets=()=>{const base={"벼":false,"맥류":false,"콩":false};if(notice?.targets&&!notice.targets.includes("전체"))notice.targets.forEach(t=>{if(t in base)base[t]=true;});return base;};
  const[targets,setTargets]=useState(initTargets);
  const[editing,setEditing]=useState(isNew);
  const[err,setErr]=useState("");
  const toggle=t=>setTargets(p=>({...p,[t]:!p[t]}));
  const submit=()=>{
    if(!title.trim())return setErr("제목을 입력해주세요.");
    if(!body.trim()) return setErr("내용을 입력해주세요.");
    const sel=Object.keys(targets).filter(k=>targets[k]);
    onSave({id:notice?.id||Date.now(),title:title.trim(),summary:body.trim(),date:notice?.date||new Date().toISOString().slice(0,10),urgent,targets:sel.length>0?sel:["전체"]});
  };
  const hdr=isNew?"📝 공지 작성":editing?"📝 공지 수정":"📢 공지 내용";
  const btnBase={border:"none",borderRadius:14,padding:"16px 0",fontSize:17,fontWeight:900,cursor:"pointer",flex:1};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}} onClick={onClose}>
      <div style={{background:"white",width:"100%",maxWidth:480,borderRadius:24,padding:20,paddingBottom:24,maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h2 style={{fontSize:17,fontWeight:900,color:"#111827",margin:0}}>{hdr}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,color:"#9ca3af",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        {editing?(
          <>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <button onClick={()=>setUrgent(p=>!p)}
                style={{padding:"8px 16px",borderRadius:12,fontWeight:900,fontSize:13,border:"2px solid",cursor:"pointer",
                  borderColor:urgent?"#ef4444":"#e5e7eb",background:urgent?"#ef4444":"white",color:urgent?"white":"#6b7280"}}>🚨 긴급</button>
              <span style={{fontSize:12,color:"#9ca3af"}}>{urgent?"긴급 공지로 표시됩니다":"일반 공지"}</span>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:6}}>공개 대상 (미선택 시 전체 공개)</label>
              <div style={{display:"flex",gap:8}}>
                {["벼","맥류","콩"].map(t=>(
                  <button key={t} onClick={()=>toggle(t)}
                    style={{flex:1,padding:"10px 0",borderRadius:12,fontWeight:900,fontSize:13,border:"2px solid",cursor:"pointer",
                      borderColor:targets[t]?"#16a34a":"#e5e7eb",background:targets[t]?"#16a34a":"white",color:targets[t]?"white":"#374151"}}>
                    {t==="벼"?"🌾 벼":t==="맥류"?"🌿 맥류":"🫛 콩"}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>제목 *</label>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="공지 제목을 입력하세요"
                style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:12,padding:"10px 12px",fontSize:14,boxSizing:"border-box",outline:"none"}}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,color:"#6b7280",display:"block",marginBottom:4}}>내용 *</label>
              <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="공지 내용을 입력하세요" rows={5}
                style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:12,padding:"10px 12px",fontSize:14,boxSizing:"border-box",outline:"none",resize:"none"}}/>
            </div>
            {err&&<p style={{color:"#ef4444",fontSize:13,fontWeight:700,marginBottom:12}}>{err}</p>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={submit} style={{...btnBase,background:"#16a34a",color:"white",boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>저장</button>
              {!isNew&&<button onClick={onDelete} style={{...btnBase,background:"#ef4444",color:"white",boxShadow:"0 4px 12px rgba(239,68,68,.3)"}}>삭제</button>}
            </div>
          </>
        ):(
          <>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {notice.urgent&&<span style={{background:"#ef4444",color:"white",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700}}>긴급</span>}
              {notice.targets&&!notice.targets.includes("전체")&&notice.targets.map(t=>(
                <span key={t} style={{background:"#dcfce7",color:"#16a34a",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700}}>{t}</span>
              ))}
            </div>
            <h3 style={{fontWeight:900,color:"#111827",fontSize:15,margin:"0 0 4px"}}>{notice.title}</h3>
            <p style={{fontSize:11,color:"#9ca3af",margin:"0 0 14px"}}>{notice.date}</p>
            <p style={{fontSize:13,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:20}}>{notice.summary}</p>
            {isAdmin&&(
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setEditing(true)} style={{...btnBase,background:"#16a34a",color:"white",boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>수정</button>
                <button onClick={onDelete} style={{...btnBase,background:"#ef4444",color:"white",boxShadow:"0 4px 12px rgba(239,68,68,.3)"}}>삭제</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ════════════════════ NOTICE SCREEN ════════════════════ */
function NoticeScreen({app,setApp,onBack,noticeModalCloser}){
  const u=app.currentUser;const isAdmin=u?.role==="admin";
  const[page,setPage]=useState(0);const[modal,setModal]=useState(null);
  const PAGE_SIZE=10;
  const userGroup=(()=>{const c=u?.crop||"";if(c==="벼")return"벼";if(c==="콩")return"콩";if(["보리","밀","트리티케일"].includes(c))return"맥류";return null;})();
  const visible=(app.notices||[]).filter(n=>{if(!n.targets||n.targets.includes("전체"))return true;if(!userGroup)return true;return n.targets.includes(userGroup);});
  const totalPages=Math.max(1,Math.ceil(visible.length/PAGE_SIZE));
  const paged=visible.slice(page*PAGE_SIZE,page*PAGE_SIZE+PAGE_SIZE);

  const closeModal=()=>setModal(null);

  // 모달 열릴 때 App의 뒤로가기 핸들러에 닫기 함수 등록
  const openModal=(m)=>{
    setModal(m);
    if(noticeModalCloser) noticeModalCloser.current=closeModal;
    history.pushState({noticeModal:true},"","");
  };

  // 모달 닫힐 때 ref 해제
  useEffect(()=>{
    if(!modal&&noticeModalCloser) noticeModalCloser.current=null;
  },[modal]);

  const saveNotice=notice=>{
    const exists=(app.notices||[]).some(n=>n.id===notice.id);
    const updated=exists?(app.notices||[]).map(n=>n.id===notice.id?notice:n):[notice,...(app.notices||[])];
    const next={...app,notices:updated};setApp(next);sv(next);setModal(null);
  };
  const deleteNotice=id=>{const next={...app,notices:(app.notices||[]).filter(n=>n.id!==id)};setApp(next);sv(next);setModal(null);};
  return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      {modal&&<NoticeModal notice={modal==="new"?null:modal} isAdmin={isAdmin} onSave={saveNotice}
        onDelete={modal!=="new"?()=>deleteNotice(modal.id):undefined} onClose={closeModal}/>}
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,flex:1,textAlign:"center",margin:0}}>📢 공지사항</h1>
      </div>
      <div style={{padding:"16px 16px 120px"}}>
        {paged.length===0
          ?<p style={{textAlign:"center",color:"#9ca3af",marginTop:64,fontSize:14}}>공지사항이 없습니다.</p>
          :paged.map(n=>(
            <div key={n.id} onClick={()=>openModal(n)}
              style={{...card,padding:16,marginBottom:10,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                {n.urgent&&<span style={{background:"#ef4444",color:"white",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,flexShrink:0}}>긴급</span>}
                {n.targets&&!n.targets.includes("전체")&&n.targets.map(t=>(
                  <span key={t} style={{background:"#dcfce7",color:"#16a34a",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:700,flexShrink:0}}>{t}</span>
                ))}
                <span style={{fontWeight:700,color:"#111827",fontSize:14,lineHeight:1.3,flex:1}}>{n.title}</span>
              </div>
              <p style={{fontSize:11,color:"#9ca3af",margin:"0 0 4px"}}>{n.date}</p>
              <p style={{fontSize:13,color:"#6b7280",margin:0,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{n.summary}</p>
            </div>
          ))
        }
        {totalPages>1&&(
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:20}}>
            <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
              style={{padding:"8px 16px",borderRadius:12,border:"2px solid #16a34a",background:"white",color:"#16a34a",fontWeight:900,fontSize:13,cursor:"pointer",opacity:page===0?.3:1}}>‹ 이전</button>
            <span style={{fontSize:13,fontWeight:700,color:"#6b7280"}}>{page+1} / {totalPages}</span>
            <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
              style={{padding:"8px 16px",borderRadius:12,border:"2px solid #16a34a",background:"white",color:"#16a34a",fontWeight:900,fontSize:13,cursor:"pointer",opacity:page===totalPages-1?.3:1}}>다음 ›</button>
          </div>
        )}
      </div>
      {isAdmin&&(
        <div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"0 16px",boxSizing:"border-box"}}>
          <button onClick={()=>openModal("new")}
            style={{width:"100%",background:"#16a34a",color:"white",border:"none",borderRadius:20,padding:"18px 0",fontSize:17,fontWeight:900,cursor:"pointer",boxShadow:"0 4px 16px rgba(22,163,74,.35)"}}>
            ✏️ 작성하기
          </button>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ HOME ════════════════════ */
function HomeScreen({app,setApp,onNoticeMore,onDisasterLink}){
  const u=app.currentUser;
  const userGroup=(()=>{const c=u?.crop||"";if(c==="벼")return"벼";if(c==="콩")return"콩";if(["보리","밀","트리티케일"].includes(c))return"맥류";return null;})();

/* ════════════════════ USER MANAGEMENT (admin) ════════════════════ */
const CROP_ORDER=["벼","콩","보리","밀","트리티케일"];
const cropRank=c=>{const i=CROP_ORDER.indexOf(c);return i===-1?99:i;};
const CROP_GROUPS={"벼":["벼"],"콩":["콩"],"맥류":["보리","밀","트리티케일"]};

function UserManageScreen({app,setApp,onBack}){
  const members=app.users.filter(u=>u.role!=="admin").sort((a,b)=>cropRank(a.crop)-cropRank(b.crop));
  const[saved,setSaved]=useState(false);

  const changeRole=(userId,newRole)=>{
    const users=app.users.map(u=>u.id===userId?{...u,role:newRole}:u);
    const next={...app,users};
    setApp(next);
    try{localStorage.setItem("seedfarm_v8",JSON.stringify(next));}catch{}
  };

  const doSave=()=>{
    try{localStorage.setItem("seedfarm_v8",JSON.stringify(app));}catch{}
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:20}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>👥 사용자 관리</h1>
      </div>
      <div style={{padding:"16px 12px 90px"}}>
        {members.length===0
          ?<p style={{textAlign:"center",color:"#9ca3af",marginTop:64,fontSize:14}}>가입된 사용자가 없습니다.</p>
          :(
            <div style={{background:"white",borderRadius:20,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.07)",border:"1px solid #f3f4f6"}}>
              <div style={{display:"grid",gridTemplateColumns:"1.1fr 1fr 1.1fr 0.9fr 0.9fr",background:"#16a34a",color:"white",textAlign:"center",fontSize:11,fontWeight:900}}>
                {["단지명","회원구분","단지회장명","작물명","품종명"].map((h,i,arr)=>(
                  <div key={h} style={{padding:"10px 4px",borderRight:i<arr.length-1?"1px solid #15803d":"none"}}>{h}</div>
                ))}
              </div>
              {members.map((u,i)=>(
                <div key={u.id} style={{display:"grid",gridTemplateColumns:"1.1fr 1fr 1.1fr 0.9fr 0.9fr",textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#f9fafb",alignItems:"center"}}>
                  <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.danjiName}</div>
                  <div style={{padding:"6px 4px",borderRight:"1px solid #f3f4f6"}}>
                    <select value={u.role||"user"} onChange={e=>changeRole(u.id,e.target.value)}
                      style={{width:"100%",border:"1.5px solid #d1d5db",borderRadius:8,padding:"5px 2px",fontSize:11,fontFamily:"inherit",outline:"none",background:"white",cursor:"pointer",textAlign:"center"}}>
                      <option value="user">일반회원</option>
                      <option value="dual">2품종생산</option>
                      <option value="admin">관리자</option>
                    </select>
                  </div>
                  <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.chairName}</div>
                  <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6"}}>{u.crop}</div>
                  <div style={{padding:"10px 4px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.variety}</div>
                </div>
              ))}
            </div>
          )}
        <button onClick={doSave}
          style={{width:"100%",marginTop:16,background:"#16a34a",color:"white",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>
          {saved?"✅ 저장됨":"💾 저장"}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════ MY ════════════════════ */
function MyScreen({app,setApp,onLogout}){
  const u=app.currentUser;

  const[newPw,setNewPw]=useState("");const[confirmPw,setConfirmPw]=useState("");const[pwErr,setPwErr]=useState("");
  const[switchOpen,setSwitchOpen]=useState(false);
  const fset=(k,v)=>setForm(p=>({...p,[k]:v}));

  const rootId=u.linkedId||u.id;
  const linkedAccounts=app.users.filter(x=>x.role!=="admin"&&(x.id===rootId||x.linkedId===rootId)&&x.id!==u.id);
  const hasLinked=linkedAccounts.length>0;

  const switchAccount=targetId=>{
    const target=app.users.find(x=>x.id===targetId);if(!target)return;
    const next={...app,currentUser:target};setApp(next);sv(next);
    setSwitchOpen(false);setEditing(false);setForm({...target});
  };

  const doSave=()=>{
    if(newPw){
      if(newPw.length<10||!/[a-zA-Z]/.test(newPw)||!/[0-9]/.test(newPw))return setPwErr("비밀번호는 10자 이상 영문+숫자 조합이어야 합니다.");
      if(newPw!==confirmPw)return setPwErr("비밀번호가 일치하지 않습니다.");
    }
    setPwErr("");
    const updated={...form,...(newPw?{pw:newPw}:{})};
    const users=app.users.map(x=>x.id===u.id?{...x,...updated}:x);
    const next={...app,users,currentUser:{...u,...updated}};
    setApp(next);sv(next);setEditing(false);setNewPw("");setConfirmPw("");
    saveExtraVarieties();
  };
  const FIELDS=[["danjiName","단지명"],["region","지역"],["chairName","단지회장명"],["crop","작물명"]];
  const isDual=u.role==="dual"||u.role==="admin";
  const[extraVarieties,setExtraVarieties]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(`extra_varieties_${u.id}`)||"[]");}catch{return[];}
  });
  const addExtraVariety=()=>setExtraVarieties(p=>{
    const n=[...p];
    if(!n[0])n[0]={variety:"",farmCount:"",area:"",production:""};
    return [...n,{variety:"",farmCount:"",area:"",production:""}];
  });
  const updExtra=(i,k,v)=>setExtraVarieties(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const removeExtra=(i)=>setExtraVarieties(p=>p.filter((_,idx)=>idx!==i));
  const saveExtraVarieties=()=>{try{localStorage.setItem(`extra_varieties_${u.id}`,JSON.stringify(extraVarieties));}catch{}};

  return(

      {/* 계정전환 모달 */}

        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={()=>setSwitchOpen(false)}>
          <div style={{background:"white",borderRadius:20,padding:20,width:"100%",maxWidth:320,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
            <h3 style={{fontWeight:900,fontSize:16,color:"#111827",margin:"0 0 16px"}}>🔄 계정 전환</h3>
            <div style={{padding:"12px 16px",borderRadius:12,background:"#f0fdf4",border:"2px solid #16a34a",marginBottom:8}}>
              <p style={{fontSize:14,fontWeight:900,color:"#16a34a",margin:"0 0 2px"}}>{u.id}</p>
              <p style={{fontSize:12,color:"#16a34a",margin:0}}>{u.crop} · {u.variety} <span style={{marginLeft:4,color:"#22c55e"}}>(현재)</span></p>
            </div>
            {linkedAccounts.map(acc=>(
              <button key={acc.id} onClick={()=>switchAccount(acc.id)}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderRadius:12,border:"2px solid #e5e7eb",background:"white",marginBottom:8,cursor:"pointer",boxSizing:"border-box"}}>
                <div style={{textAlign:"left"}}>
                  <p style={{fontSize:14,fontWeight:900,color:"#111827",margin:"0 0 2px"}}>{acc.id}</p>
                  <p style={{fontSize:12,color:"#6b7280",margin:0}}>{acc.crop} · {acc.variety}</p>
                </div>
                <span style={{color:"#16a34a",fontWeight:900,fontSize:13}}>전환 →</span>
              </button>
            ))}
            <button onClick={()=>setSwitchOpen(false)}

        {hasLinked&&(

                <input value={form[k]??""} onChange={e=>fset(k,e.target.value)} style={{flex:1,border:"2px solid #d1d5db",borderRadius:10,padding:"8px 10px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
              </div>

                <span style={{fontSize:12,fontWeight:900,color:"#16a34a"}}>품종 1</span>
              </div>
              {[["variety","품종명","text"],["farmCount","농가수","number"],["area","면적(ha)","number"],["production","생산량(kg)","number"]].map(([fk,fl,ft])=>(

                </div>
                {extraVarieties.slice(1).map((ev,i)=>(
                  <div key={i+1} style={{background:"#f0fdf4",borderRadius:12,padding:12,marginBottom:8,border:"1px solid #bbf7d0"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <span style={{fontSize:12,fontWeight:900,color:"#16a34a"}}>품종 {i+2}</span>
                      <button onClick={()=>removeExtra(i+1)} style={{background:"none",border:"none",color:"#ef4444",fontSize:16,cursor:"pointer",padding:0,lineHeight:1}}>✕</button>
                    </div>
                    {[["variety","품종명","text"],["farmCount","농가수","number"],["area","면적(ha)","number"],["production","생산량(kg)","number"]].map(([k,l,t])=>(
                      <div key={k} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,minHeight:34}}>
                        <label style={{fontSize:12,fontWeight:700,color:"#6b7280",flex:"0 0 76px",whiteSpace:"nowrap"}}>{l}</label>
                        <input type={t} value={ev[k]||""} onChange={e=>updExtra(i+1,k,e.target.value)}

              <input type="password" value={confirmPw} onChange={e=>{setConfirmPw(e.target.value);setPwErr("");}}
                placeholder="비밀번호 재확인"
                style={{width:"100%",border:"2px solid #d1d5db",borderRadius:10,padding:"10px 12px",fontSize:14,outline:"none",boxSizing:"border-box"}}/>

/* ════════════════════ DATE PICKER ════════════════════
   Calendar opens BELOW using fixed positioning
   so it is never clipped by any parent overflow.       */
function DatePicker({value,onChange}){
  // 표시값: "MM.DD" 형식
  const displayVal=value
    ?value.replace(/^(\d{4})-(\d{2})-(\d{2})$/,"$2.$3")
    :value||"";
  // native date input용 값: "YYYY-MM-DD"
  const toDateVal=v=>{
    if(!v) return "";
    if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
    const m=v.match(/^(\d{1,2})\.(\d{1,2})$/);
    if(m) return `2026-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
    return "";
  };
  return(
    <div style={{position:"relative",width:"100%",overflow:"visible",display:"inline-block"}}>
      <input type="text" value={displayVal} readOnly placeholder="월.일"
        style={{width:"100%",boxSizing:"border-box",border:"1px solid #d1d5db",borderRadius:4,padding:"4px 2px",fontSize:"0.72rem",outline:"none",textAlign:"center",cursor:"pointer",background:"white",pointerEvents:"none"}}/>
      <input type="date" value={toDateVal(value)}
        onChange={e=>{
          const v=e.target.value;
          if(!v){onChange("");return;}
          const p=v.split('-');
          onChange(`${p[1]}.${p[2]}`);
        }}
        style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
    </div>
  );
}

/* ════════════════════ TIME PICKER ════════════════════
   Blank default, opens BELOW using absolute positioning   */
function TimePicker({value,onChange}){
  const[open,setOpen]=useState(false);
  const[h1,setH1]=useState(9);const[m1,setM1]=useState(0);
  const[h2,setH2]=useState(17);const[m2,setM2]=useState(0);
  const openPicker=()=>{
    if(value){const mx=value.match(/^(\d{2}):(\d{2})~(\d{2}):(\d{2})$/);if(mx){setH1(+mx[1]);setM1(+mx[2]);setH2(+mx[3]);setM2(+mx[4]);}}
    setOpen(true);
  };
  const confirm=()=>{onChange(`${String(h1).padStart(2,"0")}:${String(m1).padStart(2,"0")}~${String(h2).padStart(2,"0")}:${String(m2).padStart(2,"0")}`);setOpen(false);};
  return(
    <div style={{position:"relative",width:"100%"}}>
      <button onClick={openPicker}
        style={{width:"100%",border:"2px solid #e5e7eb",borderRadius:8,padding:"4px 6px",fontSize:"inherit",fontFamily:"inherit",textAlign:"left",background:"white",cursor:"pointer",minHeight:"1.8rem",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>

          ))}
        </div>

        {sent&&(

            <span style={{fontSize:16}}>🔒</span>
            <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>발송 완료된 문서입니다. 반려 처리 후 수정할 수 있습니다.</span>
          </div>
        )}
        <div style={{background:"white",borderRadius:20,border:"1px solid #f3f4f6",boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:16,overflow:"visible"}}>
          <div style={{display:"grid",gridTemplateColumns:COL,background:"#16a34a",borderRadius:"20px 20px 0 0",color:"white",textAlign:"center",fontSize:12,fontWeight:900}}>
            <div style={{padding:"10px 4px",borderRight:"1px solid #15803d"}}>근무일자</div>
            <div style={{padding:"10px 4px",borderRight:"1px solid #15803d"}}>활동시간</div>
            <div style={{padding:"10px 4px"}}>활동내용</div>
          </div>
          {rows.map((row,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:COL,borderBottom:"1px solid #f3f4f6",alignItems:"center",background:sent?"#fafafa":"white",overflow:"visible"}}>
              <div style={{padding:"6px 4px",borderRight:"1px solid #f3f4f6"}}>
                {sent
                  ?<span style={{fontSize:"0.72rem",color:"#374151",padding:"3px 4px",display:"block",textAlign:"center"}}>{(row.date||"").replace(/^(\d{4})-(\d{2})-(\d{2})$/,"$2.$3")||row.date||""}</span>

                }
              </div>
              <div style={{padding:"6px 4px",borderRight:"1px solid #f3f4f6",fontSize:"0.72rem"}}>
                {sent
                  ?<span style={{fontSize:"0.82rem",color:"#374151",padding:"3px 4px",display:"block",textAlign:"center"}}>{row.time||""}</span>
                  :<select value={row.time||""} onChange={e=>updRow(i,"time",e.target.value)}
                      style={{width:"100%",border:"1px solid #d1d5db",borderRadius:6,padding:"4px 2px",fontSize:"0.72rem",fontFamily:"inherit",background:"white",textAlign:"center"}}>
                      <option value="">-</option>
                      <option value="3시간">3시간</option>
                      <option value="2시간">2시간</option>
                      <option value="1시간">1시간</option>
                    </select>
                }
              </div>
              <div style={{padding:"6px 4px"}}>
                {sent
                  ?<span style={{fontSize:"0.72rem",color:"#374151",padding:"3px 4px",display:"block"}}>{row.activity||""}</span>
                  :<ActivityCell value={row.activity} onChange={v=>updRow(i,"activity",v)}/>
                }
              </div>
            </div>
          ))}
        </div>
        {/* submission */}
        <div style={{...card,padding:16,marginBottom:16}}>
          <p style={{fontSize:13,fontWeight:700,color:"#374151",textAlign:"center",margin:"0 0 14px",paddingBottom:12,borderBottom:"1px solid #f3f4f6"}}>
            상기와 같이 생산관리지도원 활동상황을 제출합니다.
          </p>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>({u.danjiName}) 생산관리지도원: {u.chairName}</span>
            {u.signature&&<img src={u.signature} alt="서명" style={{maxHeight:48,border:"1px solid #e5e7eb",borderRadius:6}}/>}
          </div>
          <p style={{textAlign:"right",fontWeight:900,color:"#374151",fontSize:13,margin:"10px 0 0"}}>국립종자원 전북지원장 귀하</p>
        </div>
        {!sent&&<button onClick={doSave} style={{...bigBtn("#16a34a","white"),marginBottom:12,boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>저장</button>}
        <div style={{display:"flex",gap:12}}>
          {!sent&&<button onClick={()=>setDel(true)} style={{flex:1,background:"white",color:"#ef4444",border:"2px solid #ef4444",borderRadius:12,padding:16,fontSize:16,fontWeight:900,cursor:"pointer"}}>삭제</button>}
          <button onClick={doSend} disabled={sent}
            style={{flex:1,background:sent?"#9ca3af":"#2563eb",color:"white",border:"none",borderRadius:12,padding:16,fontSize:16,fontWeight:900,cursor:sent?"default":"pointer",boxShadow:sent?"none":"0 4px 12px rgba(37,99,235,.3)"}}>
            {sent?"✅ 발송완료":"발송"}
          </button>
        </div>
        {!sent&&<p style={{textAlign:"center",fontSize:12,color:"#9ca3af",marginTop:6}}>(발송 후에는 수정불가)</p>}
      </div>
      {delModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"0 24px"}}>
          <div style={{background:"white",borderRadius:20,padding:24,width:"100%",maxWidth:340,boxShadow:"0 20px 40px rgba(0,0,0,.2)"}}>
            <h3 style={{fontWeight:900,fontSize:18,color:"#111827",margin:"0 0 8px"}}>삭제하시겠습니까?</h3>
            <p style={{color:"#6b7280",fontSize:14,margin:"0 0 20px"}}>이 달의 생산관리지도부 내용이 모두 삭제됩니다.</p>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setDel(false)} style={{flex:1,background:"#f3f4f6",color:"#374151",border:"none",borderRadius:12,padding:14,fontWeight:700,cursor:"pointer"}}>닫기</button>
              <button onClick={doDel} style={{flex:1,background:"#ef4444",color:"white",border:"none",borderRadius:12,padding:14,fontWeight:700,cursor:"pointer"}}>확인</button>
            </div>
          </div>
        </div>
      )}
      {toast&&(
        <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",zIndex:200}}>
          <div style={{background:"#15803d",color:"white",fontSize:13,fontWeight:700,padding:"10px 24px",borderRadius:999,boxShadow:"0 4px 16px rgba(0,0,0,.25)"}}>
            ✅ {sent?"발송 완료되었습니다":"저장되었습니다"}
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ CROP OVERVIEW (admin) ════════════════════ */
function CropOverview({app,setApp,onBack}){
  const[sel,setSel]=useState(null);
  const today=new Date();
  const[year,setYear]=useState(Math.max(today.getFullYear(),2026));
  const[month,setMonth]=useState(today.getMonth()+1);
  const btnSt={background:"white",border:"2px solid #e5e7eb",borderRadius:10,width:34,height:34,fontWeight:900,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0};
  const selSt={flex:1,border:"2px solid #e5e7eb",borderRadius:12,padding:"8px 12px",fontSize:14,fontWeight:700,background:"white",outline:"none"};

  const openDownload=(member)=>{
    const rk=`${member.id}_${year}_${month}`;
    const rec=app.records[rk];if(!rec)return;
    const rows=rec.rows||[];const filled=rows.filter(r=>r.date).length;
    const infoRows=[["단지명",member.danjiName],["작물명",member.crop],["성명",member.chairName],["근무일수",`${filled}일`]]
      .map(([k,v])=>`<tr><td style="border:1px solid #555;padding:8px 16px;font-weight:700;background:#f0fdf4;width:144px;white-space:nowrap;font-size:22px">${k}</td><td style="border:1px solid #555;padding:8px 16px;font-size:22px">${v}</td></tr>`).join("");
    const dataRows=rows.map(r=>`<tr style="height:36px"><td style="border:1px solid #555;padding:6px 8px;text-align:center;font-size:20px;height:36px">${r.date||"&nbsp;"}</td><td style="border:1px solid #555;padding:6px 8px;text-align:center;font-size:20px;height:36px">${r.time||"&nbsp;"}</td><td style="border:1px solid #555;padding:6px 8px;font-size:20px;height:36px">${r.activity||"&nbsp;"}</td></tr>`).join("");
    const sigImg=member.signature?`<img src="${member.signature}" alt="서명" style="height:72px;border:1px solid #ccc;border-radius:3px;vertical-align:middle"/>`:"";
    const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/>
<style>
  @page{size:A4 portrait;margin:2cm;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;font-size:22px;}
  .no-print{text-align:center;padding:12px 0 8px;border-bottom:1px solid #e5e7eb;margin-bottom:16px;}
  button{padding:6px 16px;margin:3px;border-radius:6px;cursor:pointer;font-weight:700;border:none;font-size:12px;}
  @media print{.no-print{display:none!important;}}
  .page{width:100%;}
  h2{text-align:center;font-size:30px;font-weight:900;margin-bottom:10px;}
  .info-table{width:100%;border-collapse:collapse;margin-bottom:8px;}
  .section-title{font-weight:700;font-size:22px;margin-bottom:5px;}
  .data-table{width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:8px;}
  .data-table col.c1{width:22%;}.data-table col.c2{width:25%;}.data-table col.c3{width:53%;}
  .data-table th{border:1px solid #555;padding:8px 6px;text-align:center;background:#f0fdf4;font-size:20px;}
  .data-table td{height:36px;}
  .footer-text{text-align:center;font-weight:700;font-size:22px;margin:8px 0 6px;}
  .footer-sig{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:5px;font-weight:700;font-size:22px;}
  .footer-귀하{text-align:right;font-weight:900;font-size:22px;}
</style></head><body>
<div class="no-print">
  <p style="font-size:12px;color:#6b7280;margin-bottom:6px">저장할 형식을 선택하세요 (상하좌우 여백 2cm)</p>
  <button style="background:#ef4444;color:white" onclick="window.print()">📄 PDF로 저장</button>
  <button style="background:#3b82f6;color:white" onclick="alert('인쇄 → PDF 저장 후 한글에서 변환')">📝 HWP</button>
  <button style="background:#6366f1;color:white" onclick="alert('인쇄 → PDF 저장 후 Word에서 변환')">📋 DOCX</button>
  <button style="background:#6b7280;color:white" onclick="window.close()">닫기</button>
</div>
<div class="page">
  <h2>${year}년 ${month}월 생산관리지도부</h2>
  <table class="info-table"><tbody>${infoRows}</tbody></table>
  <p class="section-title">◈ 지도상황</p>
  <table class="data-table">
    <colgroup><col class="c1"/><col class="c2"/><col class="c3"/></colgroup>
    <thead><tr><th>근무일자</th><th>활동시간</th><th>활동내용</th></tr></thead>
    <tbody>${dataRows}</tbody>
  </table>
  <p class="footer-text">상기와 같이 생산관리지도원 활동상황을 제출합니다.</p>
  <div class="footer-sig"><span>(${member.danjiName}) 생산관리지도원: ${member.chairName}</span>${sigImg}</div>
  <p class="footer-귀하">국립종자원 전북지원장 귀하</p>
</div>
</body></html>`;
    const win=window.open("","_blank","width=820,height=960");
    if(win){win.document.write(html);win.document.close();}
    else alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요.");
  };

  const doReject=(memberId)=>{
    const rk=`${memberId}_${year}_${month}`;
    const rec=app.records[rk];if(!rec)return;
    const next={...app,records:{...app.records,[rk]:{...rec,sent:false}}};
    setApp(next);sv(next);
  };

  const[preview,setPreview]=useState(null);

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>📋 생산관리지도부</h1>
      </div>
      <div style={{padding:"16px 16px 90px"}}>
        {/* 연도·월 선택 */}
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16}}>
          <select value={year} onChange={e=>setYear(Number(e.target.value))} style={selSt}>
            {Array.from({length:5},(_,i)=>2026+i).map(y=><option key={y} value={y}>{y}년</option>)}
          </select>
          <select value={month} onChange={e=>setMonth(Number(e.target.value))} style={selSt}>
            {Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}
          </select>
        </div>

        {/* 작물별 모아보기 박스 */}
        <div style={{background:"white",borderRadius:16,border:"1px solid #e5e7eb",padding:16,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <p style={{fontWeight:900,color:"#111827",fontSize:14,margin:"0 0 12px"}}>📋 작물별 모아보기</p>
          <div style={{display:"flex",gap:10}}>
            {Object.keys(CROP_GROUPS).map(g=>(
              <button key={g} onClick={()=>setSel(sel===g?null:g)}
                style={{flex:1,padding:"12px 0",borderRadius:12,border:"2px solid",borderColor:sel===g?"#16a34a":"#d1fae5",background:sel===g?"#16a34a":"white",color:sel===g?"white":"#16a34a",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .2s"}}>
                {g==="벼"?"🌾":g==="콩"?"🫛":"🌿"} {g}
              </button>
            ))}
          </div>
        </div>

        {/* 선택된 작물 표 */}
        {sel&&(()=>{
          const crops=CROP_GROUPS[sel];
          const members=app.users
            .filter(u=>u.role!=="admin"&&crops.includes(u.crop))
            .map(u=>{const rec=app.records[`${u.id}_${year}_${month}`];return{...u,submitted:rec?.sent===true,hasRecord:!!rec};})
            .sort((a,b)=>a.submitted-b.submitted);
          const colStyle="1.2fr 1.2fr 1fr 0.8fr 0.8fr 0.8fr";
          const hdrCell=(t,last=false)=>(<div style={{padding:"10px 4px",borderRight:last?"none":"1px solid #15803d",textAlign:"center"}}>{t}</div>);
          const cellBr={borderRight:"1px solid #f3f4f6",padding:"6px 4px",display:"flex",alignItems:"center",justifyContent:"center"};
          return(
            <div>
              {/* 제출률 게이지 카드 */}
              {members.length>0&&(()=>{
                const total=members.length;
                const submitted=members.filter(m=>m.submitted).length;
                const pct=Math.round(submitted/total*100);
                return(
                  <div style={{background:"white",borderRadius:14,border:"1px solid #d1fae5",padding:16,marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
                    <p style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:4}}>📊 제출률 — {year}년 {month}월</p>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}}>
                      <div style={{fontSize:34,fontWeight:900,color:"#16a34a",lineHeight:1}}>
                        {pct}<span style={{fontSize:16,fontWeight:700}}>%</span>
                      </div>
                      <span style={{fontSize:12,color:"#6b7280",fontWeight:700}}>{submitted} / {total} 명 발송</span>
                    </div>
                    <div style={{position:"relative",height:18,background:"#e5e7eb",borderRadius:9,overflow:"hidden"}}>
                      <div style={{position:"absolute",top:0,left:0,height:"100%",width:`${pct}%`,background:"#16a34a",borderRadius:9,transition:"width .4s"}}/>
                      {pct>0&&<span style={{position:"absolute",top:0,left:0,width:`${pct}%`,height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"white"}}>{pct}%</span>}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                      {[0,25,50,75,100].map(v=><span key={v} style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>{v}%</span>)}
                    </div>
                  </div>
                );
              })()}
              {/* 확인 모달 */}
              {preview&&(
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setPreview(null)}>
                  <div style={{background:"white",width:"100%",maxWidth:440,borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,.25)",maxHeight:"90vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
                    <div style={{background:"#16a34a",padding:"12px 16px",borderRadius:"16px 16px 0 0",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                      <h2 style={{color:"white",fontWeight:900,fontSize:14,margin:0}}>{preview.member.danjiName} — {year}년 {month}월</h2>
                      <button onClick={()=>setPreview(null)} style={{background:"none",border:"none",color:"white",fontSize:24,fontWeight:900,cursor:"pointer",lineHeight:1,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                    <div style={{overflowY:"auto",padding:16,fontSize:12}}>
                      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:12}}>
                        <tbody>
                          {[["단지명",preview.member.danjiName],["작물명",preview.member.crop],["성명",preview.member.chairName],["근무일수",`${(preview.rec.rows||[]).filter(r=>r.date).length}일`]].map(([k,v])=>(
                            <tr key={k}>
                              <td style={{border:"1px solid #9ca3af",padding:"6px 8px",fontWeight:700,background:"#f0fdf4",width:60,whiteSpace:"nowrap"}}>{k}</td>
                              <td style={{border:"1px solid #9ca3af",padding:"6px 8px"}}>{v}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      <p style={{fontWeight:700,marginBottom:6,color:"#374151"}}>◈ 지도상황</p>
                      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:12,tableLayout:"fixed"}}>
                        <thead>
                          <tr>
                            {["근무일자","활동시간","활동내용"].map(h=>(
                              <th key={h} style={{border:"1px solid #9ca3af",padding:"6px 4px",textAlign:"center",background:"#f0fdf4",fontWeight:700}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {(preview.rec.rows||[]).map((r,i)=>(
                            <tr key={i}>
                              <td style={{border:"1px solid #e5e7eb",padding:"4px",textAlign:"center",whiteSpace:"nowrap"}}>{r.date||""}</td>
                              <td style={{border:"1px solid #e5e7eb",padding:"4px",textAlign:"center",whiteSpace:"nowrap"}}>{r.time||""}</td>
                              <td style={{border:"1px solid #e5e7eb",padding:"4px"}}>{r.activity||""}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
              <div style={{background:"white",borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.07)",border:"1px solid #f3f4f6"}}>
                <div style={{display:"grid",gridTemplateColumns:colStyle,background:"#16a34a",color:"white",textAlign:"center",fontSize:12,fontWeight:900}}>
                  {hdrCell("단지명")}{hdrCell("단지회장명")}{hdrCell("제출여부")}{hdrCell("확인")}{hdrCell("반려")}{hdrCell("다운로드",true)}
                </div>
                {members.length===0
                  ?<p style={{textAlign:"center",color:"#9ca3af",padding:"32px 0",fontSize:13}}>해당 작물 사용자가 없습니다.</p>
                  :members.map((u,i)=>{
                    const rec=app.records[`${u.id}_${year}_${month}`];
                    return(
                    <div key={u.id} style={{display:"grid",gridTemplateColumns:colStyle,textAlign:"center",fontSize:12,borderBottom:"1px solid #f3f4f6",background:i%2===0?"white":"#f9fafb",alignItems:"center"}}>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.danjiName}</div>
                      <div style={{padding:"10px 4px",borderRight:"1px solid #f3f4f6",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.chairName}</div>
                      <div style={{...cellBr}}>
                        <span style={{padding:"2px 6px",borderRadius:20,fontSize:10,fontWeight:900,background:u.submitted?"#dcfce7":"#fee2e2",color:u.submitted?"#16a34a":"#dc2626"}}>
                          {u.submitted?"제출":"미제출"}
                        </span>
                      </div>
                      <div style={{...cellBr}}>
                        {u.hasRecord
                          ?<button onClick={()=>setPreview({member:u,rec})}
                              style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#2563eb",cursor:"pointer",fontWeight:900}}>🔍</button>
                          :<span style={{color:"#d1d5db",fontSize:11}}>—</span>}

                      <div style={{...cellBr}}>
                        {u.submitted

/* 날짜 범위 선택 - 네이티브 달력 */
function DsDateRange({value,onChange}){
  const[s,setS]=useState(value?.start||"");
  const[e,setE]=useState(value?.end||"");
  React.useEffect(()=>{setS(value?.start||"");setE(value?.end||"");},[value?.start,value?.end]);

  const fmtDisp=v=>{
    if(!v) return "";
    // "MM.DD" 또는 "M.D" 형식이면 그대로
    if(/^\d{1,2}\.\d{1,2}$/.test(v)) return v;
    // "YYYY-MM-DD" 형식이면 변환
    const m=v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m) return `${m[2]}.${m[3]}`;
    return v;
  };
  const toDateVal=v=>{
    if(!v) return "";
    if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
    const m=v.match(/^(\d{1,2})\.(\d{1,2})$/);
    if(m) return `2026-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
    return "";
  };
  const fromDateVal=v=>{
    if(!v) return "";
    const p=v.split('-');
    return `${p[1]}.${p[2]}`;
  };

  const upd=(ns,ne)=>{setS(ns);setE(ne);onChange({start:ns,end:ne});};

  return(
    <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
      <div style={{position:"relative",display:"inline-block"}}>
        <input type="text" value={fmtDisp(s)} readOnly placeholder="월.일"
          className="ds-input" style={{width:56,textAlign:"center",padding:"4px 0px",cursor:"pointer",pointerEvents:"none"}}/>
        <input type="date" value={toDateVal(s)}
          onChange={ev=>{const v=fromDateVal(ev.target.value);upd(v,e);}}
          style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
      </div>
      <span style={{fontWeight:600}}>~</span>
      <div style={{position:"relative",display:"inline-block"}}>
        <input type="text" value={fmtDisp(e)} readOnly placeholder="월.일"
          className="ds-input" style={{width:56,textAlign:"center",padding:"4px 0px",cursor:"pointer",pointerEvents:"none"}}/>
        <input type="date" value={toDateVal(e)}
          onChange={ev=>{const v=fromDateVal(ev.target.value);upd(s,v);}}
          style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",opacity:0,cursor:"pointer",zIndex:2}}/>
      </div>
    </div>
  );
}

      <div className="ds-row" style={{alignItems:"flex-start"}}>

                </div>

          style={{flex:2,background:"#16a34a",color:"white",border:"none",borderRadius:12,padding:"14px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(22,163,74,.3)"}}>

          style={{flex:1,background:"white",color:"#6b7280",border:"1.5px solid #d1d5db",borderRadius:12,padding:"14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
          초기화
        </button>
      </div>
    </div>
  );
}

/* 소독·육묘 관리 메인 화면 */
function DisSeedScreen({app,onBack}){
  const u=app.currentUser;
  const curY=new Date().getFullYear();
  const[selYear,setSelYear]=useState(Math.max(curY,2026));
  const FARM_SK=`seedfarm_farms_${u?.id}`;

  // 농가 목록 로드 (연도별)
  const loadFarms=(y)=>{
    try{
      const d=JSON.parse(localStorage.getItem(FARM_SK)||"{}");
      return d[y]||["농가1","농가2","농가3","농가4","농가5"];
    }catch{return["농가1","농가2","농가3","농가4","농가5"];}
  };
  const saveFarms=(y,list)=>{
    try{
      const d=JSON.parse(localStorage.getItem(FARM_SK)||"{}");
      d[y]=list;
      localStorage.setItem(FARM_SK,JSON.stringify(d));
    }catch{}
  };

  const[farms,setFarms]=useState(()=>loadFarms(Math.max(curY,2026)));
  const[selFarm,setSelFarm]=useState(0); // 선택된 농가 인덱스

  const changeYear=(y)=>{
    setSelYear(y);
    const f=loadFarms(y);
    setFarms(f);
    setSelFarm(0);
  };

  const addFarm=()=>{
    const next=[...farms,`농가${farms.length+1}`];
    setFarms(next);
    saveFarms(selYear,next);
    setSelFarm(next.length-1);
  };

  const removeFarm=(idx)=>{
    if(!confirm(`"${farms[idx]}"을(를) 삭제하시겠습니까?`))return;
    const next=farms.filter((_,i)=>i!==idx);
    const renamed=next.length===1?["농가1"]:next;
    setFarms(renamed);
    saveFarms(selYear,renamed);
    setSelFarm(0);
  };

  const[resetKey,setResetKey]=useState(0);
  const[editingFarm,setEditingFarm]=useState(null);
  const tabKey=`${u?.id||"unknown"}_${selYear}_farm${selFarm}_r${resetKey}`;

  const renameFarm=(i,name)=>{
    const next=[...farms];
    next[i]=name||`농가${i+1}`;
    setFarms(next);
    saveFarms(selYear,next);
    setEditingFarm(null);
  };

  return(
    <div style={{minHeight:"100vh",background:"#f9fafb",paddingBottom:100}}>
      <div style={{background:"#16a34a",padding:"16px",display:"flex",alignItems:"center"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"white",fontSize:22,cursor:"pointer",marginRight:8,lineHeight:1}}>←</button>
        <h1 style={{color:"white",fontWeight:900,fontSize:18,margin:0}}>🌱 소독 · 육묘 관리</h1>
      </div>
      <div style={{padding:"16px"}}>
        {/* 기본 정보 카드 */}
        <div className="ds-card">
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,minHeight:38}}>
            <span style={{fontSize:14,fontWeight:700,color:"#374151",flex:"0 0 auto"}}>생산연도</span>
            <select value={selYear} onChange={e=>changeYear(Number(e.target.value))}
              style={{flex:1,border:"1.5px solid #9ca3af",borderRadius:10,padding:"7px 10px",fontSize:14,fontFamily:"inherit",outline:"none",background:"white",cursor:"pointer"}}>
              {Array.from({length:5},(_,i)=>2026+i).map(y=>(
                <option key={y} value={y}>{y}년</option>
              ))}
            </select>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
            <span style={{fontSize:14,fontWeight:700,color:"#374151"}}>단지명</span>
            <span style={{fontSize:14,color:"#1f2937"}}>{u?.danjiName||"—"}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
            <span style={{fontSize:14,fontWeight:700,color:"#374151"}}>품종명</span>
            <span style={{fontSize:14,color:"#1f2937"}}>{u?.variety||"—"}</span>
          </div>
        </div>

        {/* 농가 선택 */}
        <div style={{background:"white",borderRadius:14,border:"1px solid #e5e7eb",padding:"12px 14px",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:900,color:"#374151"}}>🏠 농가 선택</span>
            <button onClick={addFarm}
              style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              + 농가추가
            </button>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {farms.map((f,i)=>{
              let pressTimer=null;
              const startLong=()=>{pressTimer=setTimeout(()=>setEditingFarm(i),500);};
              const endLong=()=>{clearTimeout(pressTimer);};
              return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:2}}>
                {editingFarm===i
                  ? <input
                      autoFocus
                      defaultValue={f}
                      onBlur={e=>renameFarm(i,e.target.value.trim())}
                      onKeyDown={e=>{if(e.key==="Enter")renameFarm(i,e.target.value.trim());if(e.key==="Escape")setEditingFarm(null);}}
                      style={{padding:"6px 10px",borderRadius:20,border:"2px solid #16a34a",fontSize:13,fontWeight:700,fontFamily:"inherit",outline:"none",width:80,textAlign:"center"}}
                    />
                  : <button
                      onClick={()=>setSelFarm(i)}
                      onDoubleClick={()=>setEditingFarm(i)}
                      onMouseDown={startLong} onMouseUp={endLong} onMouseLeave={endLong}
                      onTouchStart={startLong} onTouchEnd={endLong} onTouchCancel={endLong}
                      style={{padding:"7px 14px",borderRadius:20,border:"2px solid",borderColor:selFarm===i?"#16a34a":"#d1d5db",background:selFarm===i?"#16a34a":"white",color:selFarm===i?"white":"#374151",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
                      {f}
                    </button>
                }
                {i>0&&editingFarm!==i&&<button onClick={()=>removeFarm(i)}
                  style={{width:18,height:18,borderRadius:"50%",background:"#ef4444",border:"none",color:"white",fontSize:11,fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1,marginLeft:-6,marginTop:-12,flexShrink:0}}>×</button>}
              </div>
              );
            })}
          </div>
        </div>

        {/* 침종(소독) 카드 */}
        <DisinfectionTab key={`dis_${tabKey}`} userId={tabKey}/>
        {/* 육묘 카드 */}
        <SeedlingTab key={`seed_${tabKey}`} userId={tabKey} onReset={()=>setResetKey(k=>k+1)}/>
      </div>
    </div>
  );
}
